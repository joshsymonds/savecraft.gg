syntax = "proto3";

package savecraft.v1;

option go_package = "github.com/joshsymonds/savecraft.gg/internal/proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Message is the top-level WebSocket envelope for daemon↔server communication.
// Also used inside RelayedMessage for server→UI relay.
// The oneof field numbers are grouped by category with gaps for future additions.
message Message {
  oneof payload {
    // Source lifecycle (1-9)
    SourceOnline source_online = 1;
    SourceOffline source_offline = 2;
    SourceHeartbeat source_heartbeat = 3;

    // Game discovery (10-19)
    ScanStarted scan_started = 10;
    ScanCompleted scan_completed = 11;
    GameDetected game_detected = 12;
    GameNotFound game_not_found = 13;
    Watching watching = 14;
    GamesDiscovered games_discovered = 15;

    // Parse lifecycle (20-29)
    ParseStarted parse_started = 20;
    PluginStatus plugin_status = 21;
    ParseCompleted parse_completed = 22;
    ParseFailed parse_failed = 23;

    // Push lifecycle (30-39)
    PushStarted push_started = 30;
    PushCompleted push_completed = 31;
    PushFailed push_failed = 32;

    // Plugin management (40)
    PluginUpdated plugin_updated = 40;

    // Source update management (41-43)
    SourceUpdateAvailable source_update_available = 41;
    SourceUpdateStarted source_update_started = 42;
    SourceUpdateFailed source_update_failed = 43;

    // Plugin errors (44-45)
    PluginUpdateCheckFailed plugin_update_check_failed = 44;
    PluginDownloadFailed plugin_download_failed = 45;

    // Commands: server → source (50-53)
    ConfigUpdate config_update = 50;
    RescanGame rescan_game = 51;
    PluginAvailable plugin_available = 52;
    DiscoverGames discover_games = 53;

    // Config results: source → server (54)
    ConfigResult config_result = 54;

    // State: server → UI (60-69)
    SourceState source_state = 60;

    // User actions: UI → server → source (70-79)
    TestPath test_path = 70;
    TestPathResult test_path_result = 71;

    // Registration: unauthenticated source → server (80-89)
    Register register = 80;
    RegisterResult register_result = 81;

    // Save data: source → server → source (90-99)
    PushSave push_save = 90;
    PushSaveResult push_save_result = 91;

    // Source management: source ↔ server (100-109)
    RefreshLinkCode refresh_link_code = 100;
    RefreshLinkCodeResult refresh_link_code_result = 101;
    SourceLinked source_linked = 102;
    UnlinkSource unlink_source = 103;
    DeregisterSource deregister_source = 104;
  }
}

// RelayedMessage is the server→browser WebSocket envelope.
// Wraps a Message with server-stamped metadata for event attribution.
// UserHub constructs this when forwarding events and state to UI clients.
message RelayedMessage {
  string source_id = 1;
  google.protobuf.Timestamp server_timestamp = 2;
  Message message = 3;
}

// --- Source lifecycle ---

// Source connected to the server (daemon started, mod loaded, etc.).
// Identity is resolved server-side from the WebSocket connection, not self-reported.
message SourceOnline {
  reserved 1; // was source_id — identity comes from the WS connection, not self-report
  string version = 2;
  google.protobuf.Timestamp timestamp = 3;
  string platform = 4;
  string os = 5;
  string arch = 6;
  string hostname = 7;
  string device = 8;
}

// Source disconnecting gracefully.
// Identity is resolved server-side from the WebSocket connection, not self-reported.
message SourceOffline {
  reserved 1; // was source_id — identity comes from the WS connection, not self-report
  google.protobuf.Timestamp timestamp = 2;
}

// Periodic keepalive from source. Hub updates lastSeen but does not relay to UI.
message SourceHeartbeat {}

// --- Game discovery ---

// Source is scanning a directory for save files.
message ScanStarted {
  string game_id = 1;
  string path = 2;
}

// Scan finished. Reports what was found.
message ScanCompleted {
  string game_id = 1;
  string path = 2;
  int32 files_found = 3;
  repeated string file_names = 4;
}

// A game's save directory exists and contains saves.
message GameDetected {
  string game_id = 1;
  string path = 2;
  int32 save_count = 3;
}

// None of the expected save paths exist for this game.
message GameNotFound {
  string game_id = 1;
  repeated string paths_checked = 2;
}

// Source is actively watching a directory for changes.
message Watching {
  string game_id = 1;
  string path = 2;
  int32 files_monitored = 3;
}

// Results of source auto-discovery of save directories.
message GamesDiscovered {
  repeated DiscoveredGame games = 1;
}

message DiscoveredGame {
  string game_id = 1;
  string name = 2;
  string path = 3;
  int32 file_count = 4;
  repeated string file_extensions = 5;
  repeated string file_patterns = 6;
  repeated string exclude_dirs = 7;
}

// --- Parse lifecycle ---

// Source detected a file change and is feeding it to the WASM plugin.
message ParseStarted {
  string game_id = 1;
  string file_name = 2;
}

// Forwarded from plugin stdout status lines during parsing.
// Plugin authors emit these for long-running or multi-step parses.
message PluginStatus {
  string game_id = 1;
  string file_name = 2;
  string message = 3;
}

// Plugin finished successfully. Identity and summary extracted from plugin output.
message ParseCompleted {
  string game_id = 1;
  string file_name = 2;
  SaveIdentity identity = 3;
  string summary = 4;
  int32 sections_count = 5;
  int64 size_bytes = 6;
}

// Plugin failed to parse the file.
message ParseFailed {
  string game_id = 1;
  string file_name = 2;
  ParseErrorType error_type = 3;
  string message = 4;
}

enum ParseErrorType {
  PARSE_ERROR_TYPE_UNSPECIFIED = 0;
  PARSE_ERROR_TYPE_UNSUPPORTED_VERSION = 1;
  PARSE_ERROR_TYPE_CORRUPT_FILE = 2;
  PARSE_ERROR_TYPE_PARSE_ERROR = 3;
}

// --- Push lifecycle ---

// Source is uploading parsed game state to the server via WebSocket.
message PushStarted {
  string game_id = 1;
  string summary = 2;
  int64 size_bytes = 3;
}

// Upload succeeded. Server assigned/resolved the save UUID.
message PushCompleted {
  string game_id = 1;
  string save_uuid = 2;
  string summary = 3;
  int64 snapshot_size_bytes = 4;
  int32 duration_ms = 5;
  SaveIdentity identity = 6;
}

// Upload failed. will_retry indicates if the source will retry automatically.
message PushFailed {
  string game_id = 1;
  string message = 2;
  bool will_retry = 3;
}

// --- Plugin management ---

// Source successfully updated a plugin to a new version.
message PluginUpdated {
  string game_id = 1;
  string version = 2;
}

// Failed to check for plugin updates (e.g. manifest fetch failed).
message PluginUpdateCheckFailed {
  string message = 1;
}

// Failed to download a plugin during game initialization.
message PluginDownloadFailed {
  string game_id = 1;
  string message = 2;
}

// --- Commands: server → source ---

// Full config push. Sent when user changes settings in the web UI.
message ConfigUpdate {
  map<string, GameConfig> games = 1;
}

message GameConfig {
  string save_path = 1;
  bool enabled = 2;
  repeated string file_extensions = 3;
  repeated string file_patterns = 4;
  repeated string exclude_dirs = 5;
  repeated string exclude_saves = 6;
}

// Per-game result of applying a ConfigUpdate. Sent by daemon after processing.
message ConfigResult {
  map<string, GameConfigResult> results = 1;
}

message GameConfigResult {
  bool success = 1;
  string error = 2;        // empty on success
  string resolved_path = 3; // actual path being watched (after ~ expansion etc.)
}

// Request the source to rescan a game's save directory.
message RescanGame {
  string game_id = 1;
}

// Notify source that a plugin update is available for download.
message PluginAvailable {
  string game_id = 1;
  string version = 2;
  string url = 3;
}

// Request the source to re-run save directory discovery.
message DiscoverGames {}

// --- State: server → UI ---

// Full source state snapshot. Sent to UI on WebSocket connect for cold start.
// Constructed from D1 persisted events so the page isn't blank.
message SourceState {
  repeated SourceInfo sources = 1;
}

message SourceInfo {
  string source_id = 1;
  bool online = 2;
  google.protobuf.Timestamp last_seen = 3;
  repeated GameInfo games = 4;
  string source_kind = 5;
  string hostname = 6;
  bool can_rescan = 7;
  bool can_receive_config = 8;
  string platform = 9;
  string os = 10;
  string arch = 11;
  string device = 12;
}

message GameInfo {
  string game_id = 1;
  string game_name = 2;
  GameStatusEnum status = 3;
  repeated SaveInfo saves = 4;
  google.protobuf.Timestamp last_activity = 5;
  string path = 6;
  // Human-readable error message when status is ERROR (e.g. "token_expired: Battle.net token expired").
  string error = 7;
}

enum GameStatusEnum {
  GAME_STATUS_ENUM_UNSPECIFIED = 0;
  GAME_STATUS_ENUM_DETECTED = 1;
  GAME_STATUS_ENUM_WATCHING = 2;
  GAME_STATUS_ENUM_ERROR = 3;
  GAME_STATUS_ENUM_NOT_FOUND = 4;
  GAME_STATUS_ENUM_ACTIVATING = 5;
}

message SaveInfo {
  string save_uuid = 1;
  SaveIdentity identity = 2;
  string summary = 3;
  google.protobuf.Timestamp last_updated = 4;
}

// --- User actions: UI → server → source ---

// User entered a custom save path in the web UI. Test if it's valid.
message TestPath {
  string game_id = 1;
  string path = 2;
}

// Result of a TestPath request.
message TestPathResult {
  string game_id = 1;
  string path = 2;
  bool valid = 3;
  int32 files_found = 4;
  repeated string file_names = 5;
}

// --- Source update management ---

// Server notifies source that a newer binary is available.
message SourceUpdateAvailable {
  string version = 1;
  string url = 2;
  string signature_url = 3;
  string sha256 = 4;
}

// Source acknowledges it is downloading and applying the update.
message SourceUpdateStarted {
  string version = 1;
}

// Source failed to apply the update.
message SourceUpdateFailed {
  string version = 1;
  string message = 2;
}

// --- Registration ---

// New source requesting credentials. Sent over unauthenticated /ws/register.
message Register {
  string hostname = 1;
  string os = 2;
  string arch = 3;
  string device = 4;
}

// Server response to Register with credentials and initial link code.
message RegisterResult {
  string source_uuid = 1;
  string source_token = 2;
  string link_code = 3;
  google.protobuf.Timestamp link_code_expires_at = 4;
}

// --- Save data ---

// A single named section of parsed game state.
// Section data is arbitrary per-game JSON represented as Struct.
message GameSection {
  string name = 1;
  string description = 2;
  google.protobuf.Struct data = 3;
}

// Source pushing parsed save data to the server over WebSocket.
message PushSave {
  SaveIdentity identity = 1;
  string summary = 2;
  repeated GameSection sections = 3;
  google.protobuf.Timestamp parsed_at = 4;
  string game_id = 5;
}

// Server response to PushSave with the resolved save UUID.
// If error is set, the push was rejected and save_uuid/snapshot_timestamp are empty.
message PushSaveResult {
  string save_uuid = 1;
  google.protobuf.Timestamp snapshot_timestamp = 2;
  PushSaveError error = 3;
  string game_id = 4;
}

// Why a PushSave was rejected by the server.
enum PushSaveError {
  PUSH_SAVE_ERROR_UNSPECIFIED = 0;
  PUSH_SAVE_ERROR_GAME_REMOVED = 1;
  PUSH_SAVE_ERROR_SAVE_REMOVED = 2;
}

// --- Source management ---

// Source requests a new link code (replacing any existing one).
message RefreshLinkCode {}

// Server response with fresh link code and expiry.
message RefreshLinkCodeResult {
  string link_code = 1;
  google.protobuf.Timestamp expires_at = 2;
}

// Server notification: source has been linked to a user account.
// Sent when a user enters the link code at the web UI.
message SourceLinked {
  string user_uuid = 1;
}

// Source requests to unlink from its current user. Generates a fresh link code.
message UnlinkSource {}

// Source requests permanent deletion (uninstall flow).
message DeregisterSource {}

// --- Shared types ---

// Compact save identity for display in status events and UI.
// Derived from the full GameState identity emitted by the plugin.
message SaveIdentity {
  string name = 1;
  // Game-specific display metadata. e.g. {"class": "Paladin", "level": 89}
  // Uses Struct to preserve value types (numbers, strings, bools).
  google.protobuf.Struct extra = 2;
}
