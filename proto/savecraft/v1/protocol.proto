syntax = "proto3";

package savecraft.v1;

option go_package = "github.com/joshsymonds/savecraft.gg/internal/proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Message is the top-level WebSocket envelope.
// All messages on the daemon↔server↔UI channel use this wrapper.
// The oneof field numbers are grouped by category with gaps for future additions.
message Message {
  oneof payload {
    // Daemon lifecycle (1-9)
    DaemonOnline daemon_online = 1;
    DaemonOffline daemon_offline = 2;
    DaemonHeartbeat daemon_heartbeat = 3;

    // Game discovery (10-19)
    ScanStarted scan_started = 10;
    ScanCompleted scan_completed = 11;
    GameDetected game_detected = 12;
    GameNotFound game_not_found = 13;
    Watching watching = 14;
    GamesDiscovered games_discovered = 15;

    // Parse lifecycle (20-29)
    ParseStarted parse_started = 20;
    PluginStatus plugin_status = 21;
    ParseCompleted parse_completed = 22;
    ParseFailed parse_failed = 23;

    // Push lifecycle (30-39)
    PushStarted push_started = 30;
    PushCompleted push_completed = 31;
    PushFailed push_failed = 32;

    // Plugin management (40-49)
    PluginUpdated plugin_updated = 40;

    // Daemon management (41-43)
    DaemonUpdateAvailable daemon_update_available = 41;
    DaemonUpdateStarted daemon_update_started = 42;
    DaemonUpdateFailed daemon_update_failed = 43;

    // Commands: server → daemon (50-59)
    ConfigUpdate config_update = 50;
    RescanGame rescan_game = 51;
    PluginAvailable plugin_available = 52;
    DiscoverGames discover_games = 53;

    // State: server → UI (60-69)
    DeviceState device_state = 60;

    // User actions: UI → server → daemon (70-79)
    TestPath test_path = 70;
    TestPathResult test_path_result = 71;
  }
}

// --- Daemon lifecycle ---

// Daemon process started and connected to the server.
message DaemonOnline {
  string device_id = 1;
  string version = 2;
  google.protobuf.Timestamp timestamp = 3;
  string platform = 4;
}

// Daemon shutting down gracefully (SIGTERM).
message DaemonOffline {
  string device_id = 1;
  google.protobuf.Timestamp timestamp = 2;
}

// Periodic keepalive from daemon. Hub updates lastSeen but does not relay to UI.
message DaemonHeartbeat {}

// --- Game discovery ---

// Daemon is scanning a directory for save files.
message ScanStarted {
  string game_id = 1;
  string path = 2;
}

// Scan finished. Reports what was found.
message ScanCompleted {
  string game_id = 1;
  string path = 2;
  int32 files_found = 3;
  repeated string file_names = 4;
}

// A game's save directory exists and contains saves.
message GameDetected {
  string game_id = 1;
  string path = 2;
  int32 save_count = 3;
}

// None of the expected save paths exist for this game.
message GameNotFound {
  string game_id = 1;
  repeated string paths_checked = 2;
}

// Daemon is actively watching a directory for changes.
message Watching {
  string game_id = 1;
  string path = 2;
  int32 files_monitored = 3;
}

// Results of daemon auto-discovery of save directories.
message GamesDiscovered {
  repeated DiscoveredGame games = 1;
}

message DiscoveredGame {
  string game_id = 1;
  string name = 2;
  string path = 3;
  int32 file_count = 4;
}

// --- Parse lifecycle ---

// Daemon detected a file change and is feeding it to the WASM plugin.
message ParseStarted {
  string game_id = 1;
  string file_name = 2;
}

// Forwarded from plugin stdout status lines during parsing.
// Plugin authors emit these for long-running or multi-step parses.
message PluginStatus {
  string game_id = 1;
  string file_name = 2;
  string message = 3;
}

// Plugin finished successfully. Identity and summary extracted from plugin output.
message ParseCompleted {
  string game_id = 1;
  string file_name = 2;
  SaveIdentity identity = 3;
  string summary = 4;
  int32 sections_count = 5;
  int64 size_bytes = 6;
}

// Plugin failed to parse the file.
message ParseFailed {
  string game_id = 1;
  string file_name = 2;
  ParseErrorType error_type = 3;
  string message = 4;
}

enum ParseErrorType {
  PARSE_ERROR_TYPE_UNSPECIFIED = 0;
  PARSE_ERROR_TYPE_UNSUPPORTED_VERSION = 1;
  PARSE_ERROR_TYPE_CORRUPT_FILE = 2;
  PARSE_ERROR_TYPE_PARSE_ERROR = 3;
}

// --- Push lifecycle ---

// Daemon is uploading parsed game state to the server via HTTP POST.
message PushStarted {
  string game_id = 1;
  string summary = 2;
  int64 size_bytes = 3;
}

// Upload succeeded. Server assigned/resolved the save UUID.
message PushCompleted {
  string game_id = 1;
  string save_uuid = 2;
  string summary = 3;
  int64 snapshot_size_bytes = 4;
  int32 duration_ms = 5;
  SaveIdentity identity = 6;
}

// Upload failed. will_retry indicates if the daemon will retry automatically.
message PushFailed {
  string game_id = 1;
  string message = 2;
  bool will_retry = 3;
}

// --- Plugin management ---

// Daemon successfully updated a plugin to a new version.
message PluginUpdated {
  string game_id = 1;
  string version = 2;
}

// --- Commands: server → daemon ---

// Full config push. Sent when user changes settings in the web UI.
message ConfigUpdate {
  map<string, GameConfig> games = 1;
}

message GameConfig {
  string save_path = 1;
  bool enabled = 2;
  repeated string file_extensions = 3;
}

// Request the daemon to rescan a game's save directory.
message RescanGame {
  string game_id = 1;
}

// Notify daemon that a plugin update is available for download.
message PluginAvailable {
  string game_id = 1;
  string version = 2;
  string url = 3;
}

// Request the daemon to re-run save directory discovery.
message DiscoverGames {}

// --- State: server → UI ---

// Full device state snapshot. Sent to UI on WebSocket connect for cold start.
// Constructed from D1 persisted events so the page isn't blank.
message DeviceState {
  repeated DeviceInfo devices = 1;
}

message DeviceInfo {
  string device_id = 1;
  bool online = 2;
  google.protobuf.Timestamp last_seen = 3;
  repeated GameInfo games = 4;
}

message GameInfo {
  string game_id = 1;
  string game_name = 2;
  GameStatusEnum status = 3;
  repeated SaveInfo saves = 4;
  google.protobuf.Timestamp last_activity = 5;
}

enum GameStatusEnum {
  GAME_STATUS_ENUM_UNSPECIFIED = 0;
  GAME_STATUS_ENUM_DETECTED = 1;
  GAME_STATUS_ENUM_WATCHING = 2;
  GAME_STATUS_ENUM_ERROR = 3;
  GAME_STATUS_ENUM_NOT_FOUND = 4;
  GAME_STATUS_ENUM_ACTIVATING = 5;
}

message SaveInfo {
  string save_uuid = 1;
  SaveIdentity identity = 2;
  string summary = 3;
  google.protobuf.Timestamp last_updated = 4;
}

// --- User actions: UI → server → daemon ---

// User entered a custom save path in the web UI. Test if it's valid.
message TestPath {
  string game_id = 1;
  string path = 2;
}

// Result of a TestPath request.
message TestPathResult {
  string game_id = 1;
  string path = 2;
  bool valid = 3;
  int32 files_found = 4;
  repeated string file_names = 5;
}

// --- Daemon management ---

// Server notifies daemon that a newer binary is available.
message DaemonUpdateAvailable {
  string version = 1;
  string url = 2;
  string signature_url = 3;
  string sha256 = 4;
}

// Daemon acknowledges it is downloading and applying the update.
message DaemonUpdateStarted {
  string version = 1;
}

// Daemon failed to apply the update.
message DaemonUpdateFailed {
  string version = 1;
  string message = 2;
}

// --- Shared types ---

// Compact save identity for display in status events and UI.
// Derived from the full GameState identity emitted by the plugin.
message SaveIdentity {
  string name = 1;
  // Game-specific display metadata. e.g. {"class": "Paladin", "level": 89}
  // Uses Struct to preserve value types (numbers, strings, bools).
  google.protobuf.Struct extra = 2;
}
