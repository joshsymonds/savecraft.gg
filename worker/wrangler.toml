name = "savecraft-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 4 * * *"]  # Daily at 4 AM UTC

[vars]
ENVIRONMENT = "development"
VERSION = "dev"
ALLOWED_ORIGINS = "https://savecraft.gg,https://www.savecraft.gg,https://my.savecraft.gg,http://localhost:5173"
INSTALL_URL = "https://install.savecraft.gg"

[[d1_databases]]
binding = "DB"
database_name = "savecraft"
database_id = "local"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "SAVES"
bucket_name = "savecraft-saves"

[[r2_buckets]]
binding = "PLUGINS"
bucket_name = "savecraft-plugins"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "local"

[[dispatch_namespaces]]
binding = "REFERENCE_PLUGINS"
namespace = "savecraft-reference-plugins"

[durable_objects]
bindings = [
  { name = "SOURCE_HUB", class_name = "SourceHub" },
  { name = "USER_HUB", class_name = "UserHub" }
]

[[migrations]]
tag = "v1"
new_classes = ["SourceHub"]

[[migrations]]
tag = "v2"
new_classes = ["UserHub"]

# ── Production ─────────────────────────────────────────
[env.production]
name = "savecraft-api"
routes = [
  { pattern = "api.savecraft.gg/*", zone_name = "savecraft.gg" },
  { pattern = "mcp.savecraft.gg/*", zone_name = "savecraft.gg" },
]

[env.production.vars]
ENVIRONMENT = "production"
VERSION = "dev"
ALLOWED_ORIGINS = "https://savecraft.gg,https://www.savecraft.gg,https://my.savecraft.gg"
CLERK_ISSUER = "https://intent-earwig-38.clerk.accounts.dev"
INSTALL_URL = "https://install.savecraft.gg"
MCP_HOSTNAME = "mcp.savecraft.gg"

[[env.production.d1_databases]]
binding = "DB"
database_name = "savecraft"
database_id = "aad74b56-cce0-4ee1-8263-cad15450b0b0"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "SAVES"
bucket_name = "savecraft-saves"

[[env.production.r2_buckets]]
binding = "PLUGINS"
bucket_name = "savecraft-plugins"

[[env.production.kv_namespaces]]
binding = "OAUTH_KV"
id = "8236ba2d016e4112b8fd8ffc5f61e081"

[[env.production.dispatch_namespaces]]
binding = "REFERENCE_PLUGINS"
namespace = "savecraft-reference-plugins"

[env.production.durable_objects]
bindings = [
  { name = "SOURCE_HUB", class_name = "SourceHub" },
  { name = "USER_HUB", class_name = "UserHub" }
]

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["SourceHub"]

[[env.production.migrations]]
tag = "v2"
new_sqlite_classes = ["UserHub"]

# ── Staging ────────────────────────────────────────────
[env.staging]
name = "savecraft-api-staging"
routes = [
  { pattern = "staging-api.savecraft.gg/*", zone_name = "savecraft.gg" },
  { pattern = "staging-mcp.savecraft.gg/*", zone_name = "savecraft.gg" },
]

[env.staging.vars]
ENVIRONMENT = "staging"
VERSION = "dev"
ALLOWED_ORIGINS = "https://staging.savecraft.gg,https://staging-my.savecraft.gg"
SERVER_URL = "https://staging-api.savecraft.gg"
CLERK_ISSUER = "https://dominant-frog-65.clerk.accounts.dev"
INSTALL_URL = "https://staging-install.savecraft.gg"
MCP_HOSTNAME = "staging-mcp.savecraft.gg"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "savecraft-staging"
database_id = "05c71c36-dd0a-4693-aed4-c745d975ebae"
migrations_dir = "migrations"

[[env.staging.r2_buckets]]
binding = "SAVES"
bucket_name = "savecraft-saves-staging"

[[env.staging.r2_buckets]]
binding = "PLUGINS"
bucket_name = "savecraft-plugins-staging"

[[env.staging.kv_namespaces]]
binding = "OAUTH_KV"
id = "ac23010086be4ce99b6349770d9211a0"

[[env.staging.dispatch_namespaces]]
binding = "REFERENCE_PLUGINS"
namespace = "savecraft-reference-plugins-staging"

[env.staging.durable_objects]
bindings = [
  { name = "SOURCE_HUB", class_name = "SourceHub" },
  { name = "USER_HUB", class_name = "UserHub" }
]

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["SourceHub"]

[[env.staging.migrations]]
tag = "v2"
new_sqlite_classes = ["UserHub"]
