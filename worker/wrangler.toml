name = "savecraft-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "savecraft"
database_id = "local"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "savecraft-snapshots"

[durable_objects]
bindings = [
  { name = "DAEMON_HUB", class_name = "DaemonHub" }
]

[[migrations]]
tag = "v1"
new_classes = ["DaemonHub"]

# ── Production ─────────────────────────────────────────
[env.production]
name = "savecraft-api"
route = { pattern = "api.savecraft.gg/*", zone_name = "savecraft.gg" }

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "savecraft"
database_id = "aad74b56-cce0-4ee1-8263-cad15450b0b0"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "savecraft-snapshots"

[env.production.durable_objects]
bindings = [
  { name = "DAEMON_HUB", class_name = "DaemonHub" }
]

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["DaemonHub"]

# ── Staging ────────────────────────────────────────────
[env.staging]
name = "savecraft-api-staging"
route = { pattern = "staging-api.savecraft.gg/*", zone_name = "savecraft.gg" }

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "savecraft-staging"
database_id = "05c71c36-dd0a-4693-aed4-c745d975ebae"
migrations_dir = "migrations"

[[env.staging.r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "savecraft-snapshots-staging"

[env.staging.durable_objects]
bindings = [
  { name = "DAEMON_HUB", class_name = "DaemonHub" }
]

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["DaemonHub"]
