name = "savecraft-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/15 * * * *", "0 4 * * *"]  # Every 15 min (adapter refresh) + daily at 4 AM UTC (reaper)

[vars]
ENVIRONMENT = "development"
VERSION = "dev"
ALLOWED_ORIGINS = "https://savecraft.gg,https://www.savecraft.gg,https://my.savecraft.gg,http://localhost:5173"
INSTALL_URL = "https://install.savecraft.gg"
SERVER_URL = "http://localhost:8787"
WEB_URL = "http://localhost:5173"

[[d1_databases]]
binding = "DB"
database_name = "savecraft"
database_id = "local"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "PLUGINS"
bucket_name = "savecraft-plugins"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "local"

[[dispatch_namespaces]]
binding = "REFERENCE_PLUGINS"
namespace = "savecraft-reference-plugins"

[ai]
binding = "AI"

[[vectorize]]
binding = "MTGA_RULES_INDEX"
index_name = "mtga-rules"

[[vectorize]]
binding = "MTGA_CARDS_INDEX"
index_name = "magic-cards"

[durable_objects]
bindings = [
  { name = "SOURCE_HUB", class_name = "SourceHub" },
  { name = "USER_HUB", class_name = "UserHub" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SourceHub"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserHub"]

# ── Production ─────────────────────────────────────────
[env.production]
name = "savecraft-api"
routes = [
  { pattern = "api.savecraft.gg/*", zone_name = "savecraft.gg" },
  { pattern = "mcp.savecraft.gg/*", zone_name = "savecraft.gg" },
]

[env.production.vars]
ENVIRONMENT = "production"
VERSION = "dev"
ALLOWED_ORIGINS = "https://savecraft.gg,https://www.savecraft.gg,https://my.savecraft.gg"
CLERK_ISSUER = "https://clerk.savecraft.gg"
INSTALL_URL = "https://install.savecraft.gg"
MCP_HOSTNAME = "mcp.savecraft.gg"
SERVER_URL = "https://api.savecraft.gg"
WEB_URL = "https://my.savecraft.gg"
POB_URL = "https://pob.savecraft.gg"

[[env.production.d1_databases]]
binding = "DB"
database_name = "savecraft"
database_id = "df241bb0-9b7d-48e5-a4d4-f84ebf09e6e5"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "PLUGINS"
bucket_name = "savecraft-plugins"

[[env.production.kv_namespaces]]
binding = "OAUTH_KV"
id = "8236ba2d016e4112b8fd8ffc5f61e081"

[[env.production.dispatch_namespaces]]
binding = "REFERENCE_PLUGINS"
namespace = "savecraft-reference-plugins"

[env.production.ai]
binding = "AI"

[[env.production.vectorize]]
binding = "MTGA_RULES_INDEX"
index_name = "mtga-rules"

[[env.production.vectorize]]
binding = "MTGA_CARDS_INDEX"
index_name = "magic-cards"

[env.production.durable_objects]
bindings = [
  { name = "SOURCE_HUB", class_name = "SourceHub" },
  { name = "USER_HUB", class_name = "UserHub" }
]

[[env.production.migrations]]
