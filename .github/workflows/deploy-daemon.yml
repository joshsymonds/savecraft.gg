name: Deploy Daemon

on:
  push:
    branches: [main]
    tags: ["daemon-v*"]
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'proto/**'
      - 'install/windows/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/deploy-daemon.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write  # Required for Azure OIDC federated auth

env:
  GOEXPERIMENT: jsonv2

jobs:
  test:
    name: Go (lint + test + proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: "v2.11.3"
          args: ./internal/... ./cmd/...

      - name: Check formatting
        run: |
          just fmt-go
          git diff --exit-code || (echo "goimports produced changes — run 'just fmt-go' locally" && exit 1)

      - name: Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@latest

      - name: Deadcode
        run: deadcode -test ./...

      - name: Test
        run: just test-go

      - name: Install buf
        uses: bufbuild/buf-action@8f4a1456a0ab6a1eb80ba68e53832e6fcfacc16c # v1
        with:
          setup_only: true
          version: "1.66.1"

      - name: Lint proto
        run: just proto-lint

      - name: Check generated proto
        run: |
          just proto
          git diff --exit-code || (echo "Generated proto code is stale — run 'just proto' locally" && exit 1)

  environment:
    name: Detect environment
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      is_production: ${{ steps.config.outputs.is_production }}
      version: ${{ steps.version.outputs.version }}
      msi_version: ${{ steps.version.outputs.msi_version }}
      install_url: ${{ steps.config.outputs.install_url }}
      server_url: ${{ steps.config.outputs.server_url }}
      r2_bucket: ${{ steps.config.outputs.r2_bucket }}
      app_name: ${{ steps.config.outputs.app_name }}
      status_port: ${{ steps.config.outputs.status_port }}
      frontend_url: ${{ steps.config.outputs.frontend_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        uses: ./.github/actions/compute-version
        with:
          tag_prefix: "daemon-v"

      - name: Set daemon configuration
        id: config
        env:
          DETECTED_ENV: ${{ steps.version.outputs.environment }}
        run: |
          if [ "$DETECTED_ENV" = "production" ]; then
            echo "is_production=true" >> "$GITHUB_OUTPUT"
            echo "install_url=https://install.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "server_url=https://api.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "r2_bucket=savecraft-install" >> "$GITHUB_OUTPUT"
            echo "app_name=savecraft" >> "$GITHUB_OUTPUT"
            echo "status_port=9182" >> "$GITHUB_OUTPUT"
            echo "frontend_url=https://my.savecraft.gg" >> "$GITHUB_OUTPUT"
          else
            echo "is_production=false" >> "$GITHUB_OUTPUT"
            echo "install_url=https://staging-install.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "server_url=https://staging-api.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "r2_bucket=savecraft-install-staging" >> "$GITHUB_OUTPUT"
            echo "app_name=savecraft-staging" >> "$GITHUB_OUTPUT"
            echo "status_port=9183" >> "$GITHUB_OUTPUT"
            echo "frontend_url=https://staging-my.savecraft.gg" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (Linux + macOS)
    needs: [environment]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Build daemon (Linux + macOS)
        env:
          VERSION: ${{ needs.environment.outputs.version }}
          SERVER_URL: ${{ needs.environment.outputs.server_url }}
          INSTALL_URL: ${{ needs.environment.outputs.install_url }}
          APP_NAME: ${{ needs.environment.outputs.app_name }}
          STATUS_PORT: ${{ needs.environment.outputs.status_port }}
          FRONTEND_URL: ${{ needs.environment.outputs.frontend_url }}
        run: |
          just build-daemon linux amd64 "$VERSION" "$SERVER_URL" "$INSTALL_URL" "$APP_NAME" "$STATUS_PORT" "$FRONTEND_URL"
          just build-daemon linux arm64 "$VERSION" "$SERVER_URL" "$INSTALL_URL" "$APP_NAME" "$STATUS_PORT" "$FRONTEND_URL"
          just build-daemon darwin amd64 "$VERSION" "$SERVER_URL" "$INSTALL_URL" "$APP_NAME" "$STATUS_PORT" "$FRONTEND_URL"
          just build-daemon darwin arm64 "$VERSION" "$SERVER_URL" "$INSTALL_URL" "$APP_NAME" "$STATUS_PORT" "$FRONTEND_URL"

      - name: Ed25519 sign binaries
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
          APP_NAME: ${{ needs.environment.outputs.app_name }}
        run: |
          echo "$SIGNING_KEY" | base64 -d > /tmp/signing_key.priv
          for f in dist/"${APP_NAME}"-daemon-*; do
            [ -f "$f" ] || continue
            [[ "$f" == *.sig ]] && continue
            go run ./cmd/savecraft-sign/ "$f" /tmp/signing_key.priv
          done

      - name: Clean up signing key
        if: always()
        run: rm -f /tmp/signing_key.priv

      - uses: actions/upload-artifact@v4
        with:
          name: daemon-artifacts
          path: |
            dist/${{ needs.environment.outputs.app_name }}-daemon-*

  build-windows:
    name: Build (Windows + MSI)
    needs: [environment]
    runs-on: windows-latest
    environment: signing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Build daemon (Windows)
        env:
          VERSION: ${{ needs.environment.outputs.version }}
          SERVER_URL: ${{ needs.environment.outputs.server_url }}
          INSTALL_URL: ${{ needs.environment.outputs.install_url }}
          APP_NAME: ${{ needs.environment.outputs.app_name }}
          STATUS_PORT: ${{ needs.environment.outputs.status_port }}
          FRONTEND_URL: ${{ needs.environment.outputs.frontend_url }}
        run: just build-daemon windows amd64 "$env:VERSION" "$env:SERVER_URL" "$env:INSTALL_URL" "$env:APP_NAME" "$env:STATUS_PORT" "$env:FRONTEND_URL"

      - name: Build tray (Windows)
        env:
          APP_NAME: ${{ needs.environment.outputs.app_name }}
          STATUS_PORT: ${{ needs.environment.outputs.status_port }}
          FRONTEND_URL: ${{ needs.environment.outputs.frontend_url }}
        run: just build-tray windows amd64 "$env:APP_NAME" "$env:STATUS_PORT" "$env:FRONTEND_URL"

      # Authenticode sign the .exe files before packaging into MSI
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows binaries (Authenticode)
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ secrets.SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Install WiX v5
        run: dotnet tool install --global wix --version 5.0.2

      - name: Add WixToolset.Util.wixext
        run: wix extension add WixToolset.Util.wixext/5.0.2

      - name: Build MSI (with signed binaries)
        env:
          MSI_VERSION: ${{ needs.environment.outputs.msi_version }}
          APP_NAME: ${{ needs.environment.outputs.app_name }}
        run: |
          wix build `
            -arch x64 `
            -d Version="$env:MSI_VERSION" `
            -d DaemonPath="dist/$env:APP_NAME-daemon-windows-amd64.exe" `
            -d TrayPath="dist/$env:APP_NAME-tray-windows-amd64.exe" `
            -o "dist/$env:APP_NAME.msi" `
            -ext WixToolset.Util.wixext `
            install/windows/savecraft.wxs

      - name: Sign MSI (Authenticode)
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ secrets.SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Ed25519 sign binaries
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
          APP_NAME: ${{ needs.environment.outputs.app_name }}
        shell: bash
        run: |
          echo "$SIGNING_KEY" | base64 -d > /tmp/signing_key.priv
          for f in dist/"${APP_NAME}"-daemon-windows-* dist/"${APP_NAME}"-tray-windows-*; do
            [ -f "$f" ] || continue
            [[ "$f" == *.sig ]] && continue
            go run ./cmd/savecraft-sign/ "$f" /tmp/signing_key.priv
          done

      - name: Clean up signing key
        if: always()
        shell: bash
        run: rm -f /tmp/signing_key.priv

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/${{ needs.environment.outputs.app_name }}-daemon-windows-*
            dist/${{ needs.environment.outputs.app_name }}-tray-windows-*
            dist/${{ needs.environment.outputs.app_name }}.msi

  upload-r2:
    name: Upload to R2
    needs: [environment, build, build-windows, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: daemon-artifacts
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: dist

      - name: Generate checksums
        env:
          APP_NAME: ${{ needs.environment.outputs.app_name }}
        run: |
          cd dist
          find . -maxdepth 1 \( -name "${APP_NAME}-daemon-*" -o -name "${APP_NAME}-tray-*" -o -name "${APP_NAME}.msi" \) ! -name '*.sig' -printf '%f\n' | xargs sha256sum > checksums-sha256.txt

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Generate manifest
        env:
          VERSION: ${{ needs.environment.outputs.version }}
          INSTALL_URL: ${{ needs.environment.outputs.install_url }}
          APP_NAME: ${{ needs.environment.outputs.app_name }}
        run: |
          # Compute base64 DER public key from raw Ed25519 key
          tmp_der=$(mktemp)
          printf '\x30\x2a\x30\x05\x06\x03\x2b\x65\x70\x03\x21\x00' > "$tmp_der"
          cat internal/signing/signing_key.pub >> "$tmp_der"
          pubkey=$(base64 -w0 < "$tmp_der")
          rm -f "$tmp_der"

          # Build platforms and tray objects from checksums
          platforms="{}"
          tray="{}"
          while read -r hash filename; do
            # Skip sig files, MSI, and checksums file itself
            case "$filename" in
              *.sig|*.msi|checksums-*) continue ;;
            esac
            case "$filename" in
              "${APP_NAME}"-tray-*)
                # Extract platform from tray filename: {app_name}-tray-windows-amd64.exe → windows-amd64.exe
                platform="${filename#"${APP_NAME}"-tray-}"
                tray=$(echo "$tray" | jq \
                  --arg p "$platform" \
                  --arg url "${INSTALL_URL}/daemon/v${VERSION}/${filename}" \
                  --arg sig "${INSTALL_URL}/daemon/v${VERSION}/${filename}.sig" \
                  --arg hash "$hash" \
                  '.[$p] = {url: $url, signatureUrl: $sig, sha256: $hash}')
                ;;
              "${APP_NAME}"-daemon-*)
                # Extract platform from daemon filename: {app_name}-daemon-linux-amd64 → linux-amd64
                platform="${filename#"${APP_NAME}"-daemon-}"
                platforms=$(echo "$platforms" | jq \
                  --arg p "$platform" \
                  --arg url "${INSTALL_URL}/daemon/v${VERSION}/${filename}" \
                  --arg sig "${INSTALL_URL}/daemon/v${VERSION}/${filename}.sig" \
                  --arg hash "$hash" \
                  '.[$p] = {url: $url, signatureUrl: $sig, sha256: $hash}')
                ;;
            esac
          done < dist/checksums-sha256.txt

          jq -n \
            --arg version "$VERSION" \
            --arg pubkey "$pubkey" \
            --argjson platforms "$platforms" \
            --argjson tray "$tray" \
            '{version: $version, ed25519PublicKey: $pubkey, platforms: $platforms, tray: $tray}' > dist/daemon-manifest.json

          cat dist/daemon-manifest.json

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ needs.environment.outputs.r2_bucket }}
          VERSION: ${{ needs.environment.outputs.version }}
          APP_NAME: ${{ needs.environment.outputs.app_name }}
        run: |
          pids=()
          for f in dist/"${APP_NAME}"-daemon-* dist/"${APP_NAME}"-tray-*; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            wrangler r2 object put "${R2_BUCKET}/daemon/v${VERSION}/${filename}" --file="$f" --remote &
            pids+=($!)
            wrangler r2 object put "${R2_BUCKET}/daemon/${filename}" --file="$f" --remote &
            pids+=($!)
          done
          # MSI: versioned + unversioned
          wrangler r2 object put "${R2_BUCKET}/daemon/v${VERSION}/${APP_NAME}.msi" --file="dist/${APP_NAME}.msi" --remote &
          pids+=($!)
          wrangler r2 object put "${R2_BUCKET}/daemon/${APP_NAME}.msi" --file="dist/${APP_NAME}.msi" --remote &
          pids+=($!)
          # Manifest
          wrangler r2 object put "${R2_BUCKET}/daemon/manifest.json" --file="dist/daemon-manifest.json" --remote &
          pids+=($!)
          # Wait for all uploads, fail if any failed
          for pid in "${pids[@]}"; do wait "$pid" || exit 1; done

      - name: Notify Discord (deploy)
        if: success()
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          VERSION: ${{ needs.environment.outputs.version }}
          IS_PROD: ${{ needs.environment.outputs.is_production }}
        run: |
          env_label="staging"
          if [ "$IS_PROD" = "true" ]; then env_label="production"; fi
          jq -n \
            --arg ver "$VERSION" \
            --arg env "$env_label" \
            '{embeds: [{title: ("Daemon v" + $ver + " deployed to " + $env), color: 3447003}]}' \
            | curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-

  release:
    name: GitHub Release
    needs: [environment, build, build-windows, test]
    if: needs.environment.outputs.is_production == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: daemon-artifacts
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: dist

      - name: Generate checksums
        env:
          APP_NAME: ${{ needs.environment.outputs.app_name }}
        run: |
          cd dist
          find . -maxdepth 1 \( -name "${APP_NAME}-daemon-*" -o -name "${APP_NAME}-tray-*" -o -name "${APP_NAME}.msi" \) ! -name '*.sig' -printf '%f\n' | xargs sha256sum > checksums-sha256.txt

      - name: Find previous daemon tag
        id: prev
        run: |
          prev_tag=$(git tag -l 'daemon-v*' --sort=-v:refname | sed -n '2p')
          echo "tag=${prev_tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PREV_TAG: ${{ steps.prev.outputs.tag }}
          APP_NAME: ${{ needs.environment.outputs.app_name }}
        run: |
          notes_flag=""
          if [ -n "$PREV_TAG" ]; then
            notes_flag="--notes-start-tag $PREV_TAG"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $notes_flag \
            dist/"${APP_NAME}"-daemon-* \
            dist/"${APP_NAME}"-tray-* \
            dist/"${APP_NAME}".msi \
            dist/checksums-sha256.txt

      - name: Notify Discord (release)
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh release view "$TAG" --json body -q .body | head -c 1800)
          jq -n \
            --arg tag "$TAG" \
            --arg body "$body" \
            --arg url "https://github.com/joshsymonds/savecraft.gg/releases/tag/$TAG" \
            '{embeds: [{title: ("Daemon " + $tag + " released"), description: $body, url: $url, color: 5793266}]}' \
            | curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-
