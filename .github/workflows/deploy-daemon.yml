name: Deploy Daemon

on:
  push:
    branches: [main]
    tags: ["daemon-v*"]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'install/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write

jobs:
  environment:
    name: Detect environment
    runs-on: ubuntu-latest
    outputs:
      is_production: ${{ steps.detect.outputs.is_production }}
      version: ${{ steps.detect.outputs.version }}
      server_url: ${{ steps.detect.outputs.server_url }}
      r2_bucket: ${{ steps.detect.outputs.r2_bucket }}
    steps:
      - name: Detect environment from ref
        id: detect
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/daemon-v* ]]; then
            echo "is_production=true" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#daemon-v}" >> "$GITHUB_OUTPUT"
            echo "server_url=https://api.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "r2_bucket=savecraft-plugins" >> "$GITHUB_OUTPUT"
          else
            echo "is_production=false" >> "$GITHUB_OUTPUT"
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "server_url=https://staging-api.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "r2_bucket=savecraft-plugins-staging" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    needs: environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - name: Lint install script
        run: just lint-sh && just fmt-sh-check

      - name: Build daemon (all platforms)
        env:
          VERSION: ${{ needs.environment.outputs.version }}
          SERVER_URL: ${{ needs.environment.outputs.server_url }}
        run: just build-daemon-all "$VERSION" "$SERVER_URL"

      - uses: actions/upload-artifact@v4
        with:
          name: daemon-artifacts
          path: dist/savecraft-daemon-*

  sign:
    name: Sign
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/download-artifact@v4
        with:
          name: daemon-artifacts
          path: dist

      - name: Decode signing key
        run: echo "$SIGNING_KEY" | base64 -d > /tmp/signing_key.priv
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}

      - name: Sign daemon binaries
        run: |
          for f in dist/savecraft-daemon-*; do
            [ -f "$f" ] || continue
            go run ./cmd/savecraft-sign/ "$f" /tmp/signing_key.priv
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum savecraft-daemon-* > checksums-sha256.txt

      - name: Clean up signing key
        if: always()
        run: rm -f /tmp/signing_key.priv

      - uses: actions/upload-artifact@v4
        with:
          name: signed-daemon-artifacts
          path: |
            dist/savecraft-daemon-*
            dist/checksums-sha256.txt

  upload-r2:
    name: Upload to R2
    needs: [environment, sign]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: signed-daemon-artifacts
          path: dist

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Generate manifest
        env:
          VERSION: ${{ needs.environment.outputs.version }}
          SERVER_URL: ${{ needs.environment.outputs.server_url }}
        run: |
          # Build platforms object from checksums
          platforms="{}"
          while IFS='  ' read -r hash filename; do
            # Skip sig files and checksums file itself
            case "$filename" in
              *.sig|checksums-*) continue ;;
            esac
            # Extract platform from filename: savecraft-daemon-linux-amd64 → linux-amd64
            platform="${filename#savecraft-daemon-}"
            platforms=$(echo "$platforms" | jq \
              --arg p "$platform" \
              --arg url "${SERVER_URL}/daemon/${filename}" \
              --arg sig "${SERVER_URL}/daemon/${filename}.sig" \
              --arg hash "$hash" \
              '.[$p] = {url: $url, signatureUrl: $sig, sha256: $hash}')
          done < dist/checksums-sha256.txt

          jq -n \
            --arg version "$VERSION" \
            --argjson platforms "$platforms" \
            '{version: $version, platforms: $platforms}' > dist/daemon-manifest.json

          cat dist/daemon-manifest.json

      - name: Upload binaries to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ needs.environment.outputs.r2_bucket }}
        run: |
          for f in dist/savecraft-daemon-*; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            wrangler r2 object put "${R2_BUCKET}/daemon/${filename}" --file="$f" --remote
          done

      - name: Upload manifest to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ needs.environment.outputs.r2_bucket }}
        run: |
          wrangler r2 object put "${R2_BUCKET}/daemon/manifest.json" --file="dist/daemon-manifest.json" --remote

  release:
    name: GitHub Release
    needs: [environment, sign]
    if: needs.environment.outputs.is_production == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: signed-daemon-artifacts
          path: dist

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#daemon-v}" >> "$GITHUB_OUTPUT"

      - name: Bake public key into install.sh
        run: |
          tmp_der=$(mktemp)
          printf '\x30\x2a\x30\x05\x06\x03\x2b\x65\x70\x03\x21\x00' > "$tmp_der"
          cat internal/signing/signing_key.pub >> "$tmp_der"
          b64_key=$(base64 -w0 < "$tmp_der")
          rm -f "$tmp_der"
          sed -i "s|REPLACE_WITH_BASE64_PUBKEY|${b64_key}|" install/install.sh

      - name: Substitute version in install.sh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: sed -i "s|^readonly VERSION=.*|readonly VERSION=\"${VERSION}\"|" install/install.sh

      - name: Find previous daemon tag
        id: prev
        run: |
          prev_tag=$(git tag -l 'daemon-v*' --sort=-v:refname | sed -n '2p')
          echo "tag=${prev_tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PREV_TAG: ${{ steps.prev.outputs.tag }}
        run: |
          notes_flag=""
          if [ -n "$PREV_TAG" ]; then
            notes_flag="--notes-start-tag $PREV_TAG"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $notes_flag \
            dist/savecraft-daemon-* \
            dist/checksums-sha256.txt \
            install/install.sh

      - name: Notify Discord
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh release view "$TAG" --json body -q .body | head -c 1800)
          jq -n \
            --arg tag "$TAG" \
            --arg body "$body" \
            --arg url "https://github.com/joshsymonds/savecraft.gg/releases/tag/$TAG" \
            '{embeds: [{title: ("Daemon " + $tag + " released"), description: $body, url: $url, color: 5793266}]}' \
            | curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-
