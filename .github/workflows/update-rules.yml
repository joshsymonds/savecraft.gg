name: Update MTG Rules Data

on:
  schedule:
    - cron: "0 6 * * 0" # Every Sunday at 6 AM UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Force update even if rules haven't changed"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download and hash Comprehensive Rules
        id: check
        env:
          FORCE_UPDATE: ${{ inputs.force }}
        run: |
          curl -sSfL "https://media.wizards.com/2025/downloads/MagicCompRules%2020251114.txt" -o /tmp/comp-rules.txt
          NEW_HASH=$(sha256sum /tmp/comp-rules.txt | cut -d' ' -f1)
          echo "new_hash=$NEW_HASH" >> "$GITHUB_OUTPUT"

          OLD_HASH=""
          if [ -f .github/rules-hash.sha256 ]; then
            OLD_HASH=$(cat .github/rules-hash.sha256)
          fi
          echo "old_hash=$OLD_HASH" >> "$GITHUB_OUTPUT"

          if [ "$NEW_HASH" = "$OLD_HASH" ] && [ "$FORCE_UPDATE" != "true" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Rules unchanged (hash: $NEW_HASH)"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Rules changed: $OLD_HASH → $NEW_HASH"
          fi

      - name: Run rules-fetch (generate JSON)
        if: steps.check.outputs.changed == 'true'
        run: go run ./plugins/mtga/tools/rules-fetch/

      - name: Populate staging D1 + Vectorize
        if: steps.check.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          go run ./plugins/mtga/tools/rules-fetch/ \
            --d1-database-id=0147892e-82e6-413e-a0ef-52f6d8787fdf \
            --vectorize-index=mtga-rules-staging

      - name: Populate production D1 + Vectorize
        if: steps.check.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          go run ./plugins/mtga/tools/rules-fetch/ \
            --d1-database-id=df241bb0-9b7d-48e5-a4d4-f84ebf09e6e5 \
            --vectorize-index=mtga-rules

      - name: Update hash and commit
        if: steps.check.outputs.changed == 'true'
        env:
          NEW_HASH: ${{ steps.check.outputs.new_hash }}
        run: |
          echo "$NEW_HASH" > .github/rules-hash.sha256
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/rules-hash.sha256
          git diff --cached --quiet || git commit -m "Update MTG rules hash"
          git push
