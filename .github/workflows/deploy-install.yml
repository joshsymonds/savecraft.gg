name: Deploy Install

on:
  push:
    branches: [main]
    tags: ["install-v*"]
    paths:
      - 'install/**'
      - 'scripts/**'
      - '.github/workflows/deploy-install.yml'
  pull_request:
    paths:
      - 'install/**'
      - 'scripts/**'
      - '.github/workflows/deploy-install.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Install (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: install/worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci
        working-directory: install/worker

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Lint shell scripts
        run: just lint-sh && just fmt-sh-check

      - name: Test install worker
        run: just test-install-worker

      - name: Test install script (Docker)
        run: just test-install-docker

  environment:
    name: Detect environment
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      is_production: ${{ steps.config.outputs.is_production }}
      version: ${{ steps.version.outputs.version }}
      wrangler_env: ${{ steps.config.outputs.wrangler_env }}
      r2_bucket: ${{ steps.config.outputs.r2_bucket }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        uses: ./.github/actions/compute-version
        with:
          tag_prefix: "install-v"

      - name: Set install configuration
        id: config
        env:
          DETECTED_ENV: ${{ steps.version.outputs.environment }}
        run: |
          if [ "$DETECTED_ENV" = "production" ]; then
            echo "is_production=true" >> "$GITHUB_OUTPUT"
            echo "wrangler_env=production" >> "$GITHUB_OUTPUT"
            echo "r2_bucket=savecraft-install" >> "$GITHUB_OUTPUT"
          else
            echo "is_production=false" >> "$GITHUB_OUTPUT"
            echo "wrangler_env=staging" >> "$GITHUB_OUTPUT"
            echo "r2_bucket=savecraft-install-staging" >> "$GITHUB_OUTPUT"
          fi

  upload:
    name: Upload (${{ matrix.target }})
    needs: [environment, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [curl]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: install/worker/package-lock.json

      - name: Install wrangler
        run: npm ci
        working-directory: install/worker

      - name: Upload curl installer
        if: matrix.target == 'curl'
        run: npx wrangler r2 object put "${{ needs.environment.outputs.r2_bucket }}/curl/install.sh" --file ../install.sh --content-type "text/x-shellscript" --remote
        working-directory: install/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload curl metadata
        if: matrix.target == 'curl'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ needs.environment.outputs.r2_bucket }}
          VERSION: ${{ needs.environment.outputs.version }}
        run: |
          echo "{\"version\":\"${VERSION}\"}" > /tmp/metadata.json
          npx wrangler r2 object put "${R2_BUCKET}/curl/metadata.json" --file /tmp/metadata.json --content-type "application/json" --remote
          rm -f /tmp/metadata.json
        working-directory: install/worker

  deploy:
    name: Deploy Worker
    needs: [environment, upload]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: install/worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: install/worker

      - name: Deploy
        run: npx wrangler deploy --env ${{ needs.environment.outputs.wrangler_env }}
        working-directory: install/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify Discord (deploy)
        if: success()
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          VERSION: ${{ needs.environment.outputs.version }}
          IS_PROD: ${{ needs.environment.outputs.is_production }}
        run: |
          env_label="staging"
          if [ "$IS_PROD" = "true" ]; then env_label="production"; fi
          jq -n \
            --arg ver "$VERSION" \
            --arg env "$env_label" \
            '{embeds: [{title: ("Install v" + $ver + " deployed to " + $env), color: 3447003}]}' \
            | curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-

  release:
    name: GitHub Release
    needs: [environment, deploy]
    if: needs.environment.outputs.is_production == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find previous install tag
        id: prev
        run: |
          prev_tag=$(git tag -l 'install-v*' --sort=-v:refname | sed -n '2p')
          echo "tag=${prev_tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PREV_TAG: ${{ steps.prev.outputs.tag }}
        run: |
          notes_flag=""
          if [ -n "$PREV_TAG" ]; then
            notes_flag="--notes-start-tag $PREV_TAG"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $notes_flag

      - name: Notify Discord (release)
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh release view "$TAG" --json body -q .body | head -c 1800)
          jq -n \
            --arg tag "$TAG" \
            --arg body "$body" \
            --arg url "https://github.com/joshsymonds/savecraft.gg/releases/tag/$TAG" \
            '{embeds: [{title: ("Install " + $tag + " deployed"), description: $body, url: $url, color: 5793266}]}' \
            | curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-
