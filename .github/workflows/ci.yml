name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      worker: ${{ steps.filter.outputs.worker }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            go:
              - 'internal/**'
              - 'cmd/**'
              - 'plugins/**'
              - 'proto/**'
              - 'go.mod'
              - 'go.sum'
            worker:
              - 'worker/**'
              - 'proto/**'
            web:
              - 'web/**'
            sh:
              - 'install/**'
              - 'scripts/**'

  go:
    name: Go (lint + test + proto)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          args: ./internal/... ./cmd/...

      - name: Check formatting
        run: |
          just fmt-go
          git diff --exit-code || (echo "goimports produced changes — run 'just fmt-go' locally" && exit 1)

      - name: Deadcode
        run: go run golang.org/x/tools/cmd/deadcode@latest -test ./internal/... ./cmd/...

      - name: Test
        run: just test-go

      - name: Install buf
        uses: bufbuild/buf-action@8f4a1456a0ab6a1eb80ba68e53832e6fcfacc16c # v1
        with:
          setup_only: true

      - name: Lint proto
        run: just proto-lint

      - name: Check generated proto
        run: |
          just proto
          git diff --exit-code || (echo "Generated proto code is stale — run 'just proto' locally" && exit 1)

  worker:
    name: Worker (lint + test)
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Lint
        run: just lint-worker
        working-directory: .

      - name: Check formatting
        run: just fmt-worker-check
        working-directory: .

      - name: Test
        run: just test-worker
        working-directory: .

  web:
    name: Web (lint + typecheck + test)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    env:
      PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Generate SvelteKit types
        run: npx svelte-kit sync

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Lint
        run: just lint-web
        working-directory: .

      - name: Check formatting
        run: just fmt-web-check
        working-directory: .

      - name: Typecheck
        run: just check-web
        working-directory: .

      - name: Test
        run: just test-web
        working-directory: .

