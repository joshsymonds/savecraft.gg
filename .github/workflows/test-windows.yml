name: Test Windows Installer

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'install/windows/**'
      - 'tests/windows/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test-windows.yml'
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'install/windows/**'
      - 'tests/windows/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test-windows.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  GOEXPERIMENT: jsonv2

jobs:
  test-msi:
    name: MSI Install/Uninstall
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Build daemon (Windows, CGO)
        run: just build-daemon windows amd64

      - name: Build tray (Windows)
        run: just build-tray windows amd64

      - name: Install WiX v5
        run: dotnet tool install --global wix --version 5.0.2

      - name: Add WixToolset.Util.wixext
        run: wix extension add WixToolset.Util.wixext/5.0.2

      - name: Build MSI
        run: |
          wix build `
            -arch x64 `
            -d Version="1.0.0" `
            -d DaemonPath="dist/savecraft-daemon-windows-amd64.exe" `
            -d TrayPath="dist/savecraft-tray-windows-amd64.exe" `
            -o "dist/savecraft.msi" `
            -ext WixToolset.Util.wixext `
            install/windows/savecraft.wxs
          $msi = Get-Item "dist/savecraft.msi"
          Write-Output "MSI size: $($msi.Length) bytes"
          if ($msi.Length -lt 1024) { throw "MSI file too small ($($msi.Length) bytes) - build likely failed" }

      - name: Run MSI integration tests
        run: python tests/windows/test_msi_install.py

  test-go-windows:
    name: Go Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run selfupdate tests
        run: go test -v ./internal/selfupdate/...

      - name: Run svcmgr tests
        run: go test -v ./internal/svcmgr/...

      - name: Run tray tests
        run: go test -v ./cmd/savecraft-tray/...
