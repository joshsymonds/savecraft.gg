name: Update MTGA Reference Data

on:
  schedule:
    - cron: "0 6 * * 0" # Every Sunday at 6 AM UTC
  workflow_dispatch: {}

# All pipelines are idempotent — safe to re-run every week even if upstream
# data hasn't changed. D1 bulk import deduplicates by etag (skips if same
# data already imported). Re-downloading upstream data is cheap.
#
# Matrix per environment: staging and production run in parallel against
# separate D1 databases (no import lock contention). Within each matrix
# job, tools run sequentially to avoid concurrent imports on the same DB.

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env:
          - name: staging
            d1: "0147892e-82e6-413e-a0ef-52f6d8787fdf"
            rules_vectorize: "mtga-rules-staging"
            cards_vectorize: "mtga-cards-staging"
          - name: production
            d1: "df241bb0-9b7d-48e5-a4d4-f84ebf09e6e5"
            rules_vectorize: "mtga-rules"
            cards_vectorize: "mtga-cards"
    name: "update (${{ matrix.env.name }})"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Update rules
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          go run ./plugins/mtga/tools/rules-fetch/ \
            --d1-database-id=${{ matrix.env.d1 }} \
            --vectorize-index=${{ matrix.env.rules_vectorize }}

      - name: Update cards
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          go run ./plugins/mtga/tools/scryfall-fetch/ \
            --d1-database-id=${{ matrix.env.d1 }} \
            --vectorize-index=${{ matrix.env.cards_vectorize }}

      - name: Update draft ratings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          go run ./plugins/mtga/tools/17lands-fetch/ \
            --d1-database-id=${{ matrix.env.d1 }}
