name: Deploy Plugin

on:
  push:
    branches: [main]
    tags: ["plugin-v*"]
    paths:
      - 'plugins/*/plugin.toml'
      - 'plugins/*/*.go'
      - 'plugins/*/d2s/**'
      - '.github/workflows/deploy-plugin.yml'
  pull_request:
    paths:
      - 'plugins/*/plugin.toml'
      - 'plugins/*/*.go'
      - 'plugins/*/d2s/**'
      - '.github/workflows/deploy-plugin.yml'
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin game_id to release (e.g. d2r)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Build plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.changed.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Detect plugins to build
        id: changed
        env:
          MANUAL_PLUGIN: ${{ inputs.plugin }}
        run: |
          if [ -n "$MANUAL_PLUGIN" ]; then
            # workflow_dispatch: use provided plugin name
            changed="$MANUAL_PLUGIN"
          else
            # Check all plugins with a plugin.toml
            changed=""
            for dir in plugins/*/; do
              game_id=$(basename "$dir")
              [ -f "plugins/${game_id}/plugin.toml" ] || continue
              changed="${changed} ${game_id}"
            done
            changed=$(echo "$changed" | xargs)
          fi
          echo "plugins=${changed}" >> "$GITHUB_OUTPUT"
          if [ -z "$changed" ]; then
            echo "No plugins to check"
          else
            echo "Plugins to check: ${changed}"
          fi

      - name: Build plugins
        if: steps.changed.outputs.plugins != ''
        env:
          CHANGED_PLUGINS: ${{ steps.changed.outputs.plugins }}
        run: |
          for game_id in $CHANGED_PLUGINS; do
            echo "==> Building plugin: ${game_id}"
            just build-plugin "$game_id"
          done

  deploy:
    name: Sign and upload
    needs: test
    if: github.event_name != 'pull_request' && needs.test.outputs.plugins != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/plugin-v* ]]; then
            echo "r2_bucket=savecraft-plugins" >> "$GITHUB_OUTPUT"
            echo "is_production=true" >> "$GITHUB_OUTPUT"
          else
            echo "r2_bucket=savecraft-plugins-staging" >> "$GITHUB_OUTPUT"
            echo "is_production=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Decode signing key
        run: echo "$SIGNING_KEY" | base64 -d > /tmp/signing_key.priv
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}

      - name: Build, sign, and upload plugins
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CHANGED_PLUGINS: ${{ needs.test.outputs.plugins }}
          R2_BUCKET: ${{ steps.env.outputs.r2_bucket }}
        run: |
          for game_id in $CHANGED_PLUGINS; do
            echo "==> Processing plugin: ${game_id}"

            # Read version from plugin.toml
            new_version=$(grep '^version' "plugins/${game_id}/plugin.toml" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            echo "    Local version: ${new_version}"

            # Fetch current manifest from R2 to compare versions
            set +e
            wrangler r2 object get "${R2_BUCKET}/plugins/${game_id}/manifest.json" --file /tmp/current_manifest.json --remote 2>/dev/null
            fetch_rc=$?
            set -e

            if [ $fetch_rc -eq 0 ] && [ -f /tmp/current_manifest.json ]; then
              current_version=$(jq -r '.version // empty' /tmp/current_manifest.json)
              rm -f /tmp/current_manifest.json
              if [ "$current_version" = "$new_version" ]; then
                echo "    Version ${new_version} already published — skipping"
                continue
              fi
              echo "    Current R2 version: ${current_version} → upgrading to ${new_version}"
            else
              rm -f /tmp/current_manifest.json
              echo "    No existing manifest in R2 — first release"
            fi

            # Build WASM
            just build-plugin "$game_id"

            # Sign WASM
            wasm_file="plugins/${game_id}/${game_id}.wasm"
            go run ./cmd/savecraft-sign/ "$wasm_file" /tmp/signing_key.priv

            # Generate manifest.json from plugin.toml
            go run ./cmd/plugin-manifest/ "plugins/${game_id}"

            # Upload to R2
            wrangler r2 object put "${R2_BUCKET}/plugins/${game_id}/parser.wasm" --file "$wasm_file" --remote
            wrangler r2 object put "${R2_BUCKET}/plugins/${game_id}/parser.wasm.sig" --file "${wasm_file}.sig" --remote
            wrangler r2 object put "${R2_BUCKET}/plugins/${game_id}/manifest.json" --file "plugins/${game_id}/manifest.json" --remote

            echo "    Published ${game_id} v${new_version}"
          done

      - name: Clean up signing key
        if: always()
        run: rm -f /tmp/signing_key.priv

      - name: Find previous plugin tag
        if: steps.env.outputs.is_production == 'true'
        id: prev
        run: |
          prev_tag=$(git tag -l 'plugin-v*' --sort=-v:refname | sed -n '2p')
          echo "tag=${prev_tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.env.outputs.is_production == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PREV_TAG: ${{ steps.prev.outputs.tag }}
        run: |
          notes_flag=""
          if [ -n "$PREV_TAG" ]; then
            notes_flag="--notes-start-tag $PREV_TAG"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $notes_flag

      - name: Notify Discord
        if: success() && steps.env.outputs.is_production == 'true'
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          CHANGED_PLUGINS: ${{ needs.test.outputs.plugins }}
        run: |
          for game_id in $CHANGED_PLUGINS; do
            version=$(grep '^version' "plugins/${game_id}/plugin.toml" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            jq -n \
              --arg gid "$game_id" \
              --arg ver "$version" \
              '{embeds: [{title: ("Plugin " + $gid + " v" + $ver + " released"), description: ("The " + $gid + " plugin has been updated to v" + $ver + "."), color: 5793266}]}' \
              | curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-
          done
