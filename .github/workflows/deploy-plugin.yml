name: Deploy Plugin

on:
  push:
    branches: [main]
    tags: ["plugin-*-v*"]
    paths:
      - 'plugins/*/plugin.toml'
      - 'plugins/**/*.go'
      - 'plugins/**/*.rs'
      - 'plugins/**/Cargo.toml'
      - 'plugins/*/icon.*'
      - 'reference/src/**'
      - 'reference/test/**'
      - 'reference/wrangler.toml'
      - '.github/workflows/deploy-plugin.yml'
  pull_request:
    paths:
      - 'plugins/*/plugin.toml'
      - 'plugins/**/*.go'
      - 'plugins/**/*.rs'
      - 'plugins/**/Cargo.toml'
      - 'plugins/*/icon.*'
      - 'reference/src/**'
      - 'reference/test/**'
      - 'reference/wrangler.toml'
      - '.github/workflows/deploy-plugin.yml'
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin game_id to release (e.g. d2r)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

env:
  GOEXPERIMENT: jsonv2

jobs:
  test:
    name: Build plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.changed.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - uses: dtolnay/rust-toolchain@stable

      - name: Detect plugins to build
        id: changed
        env:
          MANUAL_PLUGIN: ${{ inputs.plugin }}
        run: |
          if [ -n "$MANUAL_PLUGIN" ]; then
            # workflow_dispatch: use provided plugin name
            changed="$MANUAL_PLUGIN"
          else
            # Check all plugins with a plugin.toml
            changed=""
            for dir in plugins/*/; do
              game_id=$(basename "$dir")
              [ -f "plugins/${game_id}/plugin.toml" ] || continue
              changed="${changed} ${game_id}"
            done
            changed=$(echo "$changed" | xargs)
          fi
          echo "plugins=${changed}" >> "$GITHUB_OUTPUT"
          if [ -z "$changed" ]; then
            echo "No plugins to check"
          else
            echo "Plugins to check: ${changed}"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build plugins
        if: steps.changed.outputs.plugins != ''
        env:
          CHANGED_PLUGINS: ${{ steps.changed.outputs.plugins }}
        run: |
          for game_id in $CHANGED_PLUGINS; do
            echo "==> Building plugin: ${game_id}"
            just build-plugin "$game_id"
          done

      - name: Verify manifest.json is up to date
        if: steps.changed.outputs.plugins != ''
        env:
          CHANGED_PLUGINS: ${{ steps.changed.outputs.plugins }}
        run: |
          for game_id in $CHANGED_PLUGINS; do
            echo "==> Checking manifest: ${game_id}"
            go run ./cmd/plugin-manifest/ --version dev "plugins/${game_id}"
          done
          # Ignore sha256 lines — WASM binaries aren't reproducible across
          # environments (Rust/Go compiler, OS, linker). The deploy step
          # regenerates the manifest from freshly-built binaries anyway.
          if ! git diff --exit-code -I '"sha256":' plugins/*/manifest.json; then
            echo ""
            echo "ERROR: manifest.json is out of date (ignoring sha256). Run 'just plugin-manifest <game> dev' and commit the result."
            exit 1
          fi

      - name: Test reference Worker infrastructure
        if: steps.changed.outputs.plugins != ''
        run: |
          # Only test if at least one plugin produced a reference.wasm
          if ls plugins/*/reference.wasm 1>/dev/null 2>&1; then
            cd reference && npm ci && just test
          else
            echo "No reference.wasm found, skipping reference worker tests"
          fi

  deploy:
    name: Sign and upload
    needs: test
    if: github.event_name != 'pull_request' && needs.test.outputs.plugins != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse tag for game_id
        id: parse
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_NAME" == plugin-*-v* ]]; then
            # Extract game_id: plugin-{game_id}-v{version} → game_id
            temp="${REF_NAME#plugin-}"
            game_id="${temp%-v*}"
            echo "game_id=${game_id}" >> "$GITHUB_OUTPUT"
            echo "tag_prefix=plugin-${game_id}-v" >> "$GITHUB_OUTPUT"
          else
            echo "game_id=" >> "$GITHUB_OUTPUT"
            echo "tag_prefix=plugin-v" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute version
        id: version
        uses: ./.github/actions/compute-version
        with:
          tag_prefix: ${{ steps.parse.outputs.tag_prefix }}

      - name: Set plugin configuration
        id: config
        env:
          DETECTED_ENV: ${{ steps.version.outputs.environment }}
        run: |
          if [ "$DETECTED_ENV" = "production" ]; then
            echo "is_production=true" >> "$GITHUB_OUTPUT"
            echo "r2_bucket=savecraft-plugins" >> "$GITHUB_OUTPUT"
            echo "server_url=https://api.savecraft.gg" >> "$GITHUB_OUTPUT"
          else
            echo "is_production=false" >> "$GITHUB_OUTPUT"
            echo "r2_bucket=savecraft-plugins-staging" >> "$GITHUB_OUTPUT"
            echo "server_url=https://staging-api.savecraft.gg" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Decode signing key
        run: echo "$SIGNING_KEY" | base64 -d > /tmp/signing_key.priv
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}

      - name: Build, sign, and upload plugins
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALL_PLUGINS: ${{ needs.test.outputs.plugins }}
          TAG_GAME_ID: ${{ steps.parse.outputs.game_id }}
          R2_BUCKET: ${{ steps.config.outputs.r2_bucket }}
          VERSION: ${{ steps.version.outputs.version }}
          IS_PRODUCTION: ${{ steps.config.outputs.is_production }}
        run: |
          # Production: deploy only the tagged game. Staging: deploy all.
          if [ -n "$TAG_GAME_ID" ]; then
            deploy_plugins="$TAG_GAME_ID"
          else
            deploy_plugins="$ALL_PLUGINS"
          fi

          if [ "$IS_PRODUCTION" = "true" ]; then
            dispatch_ns="savecraft-reference-plugins"
          else
            dispatch_ns="savecraft-reference-plugins-staging"
          fi

          # Pre-install reference Worker dependencies (used by plugins with reference.wasm)
          if [ -d reference ]; then
            cd reference && npm ci && cd ..
          fi

          for game_id in $deploy_plugins; do
            echo "==> Processing plugin: ${game_id} v${VERSION}"
            pids=()

            # Generate manifest (works for both WASM and API plugins)
            just build-plugin "$game_id"
            go run ./cmd/plugin-manifest/ --version "$VERSION" "plugins/${game_id}"

            # Detect plugin source types from plugin.toml (sources is an array)
            plugin_sources=$(grep '^sources *=' "plugins/${game_id}/plugin.toml" | sed 's/.*\[//;s/\].*//;s/"//g;s/,/ /g')

            # Upload icon if present (background)
            for icon_ext in png svg; do
              icon_file="plugins/${game_id}/icon.${icon_ext}"
              if [ -f "$icon_file" ]; then
                wrangler r2 object put "${R2_BUCKET}/plugins/${game_id}/icon.${icon_ext}" --file "$icon_file" --remote &
                pids+=($!)
              fi
            done

            # WASM plugins: sign and upload parser.wasm
            if echo "$plugin_sources" | grep -qw "wasm"; then
              parser_file="plugins/${game_id}/parser.wasm"
              go run ./cmd/savecraft-sign/ "$parser_file" /tmp/signing_key.priv
              wrangler r2 object put "${R2_BUCKET}/plugins/${game_id}/parser.wasm" --file "$parser_file" --remote &
              pids+=($!)
              wrangler r2 object put "${R2_BUCKET}/plugins/${game_id}/parser.wasm.sig" --file "${parser_file}.sig" --remote &
              pids+=($!)
            fi

            # Any plugin with reference.wasm: sign, upload, deploy to WfP
            ref_file="plugins/${game_id}/reference.wasm"
            if [ -f "$ref_file" ]; then
              go run ./cmd/savecraft-sign/ "$ref_file" /tmp/signing_key.priv
              wrangler r2 object put "${R2_BUCKET}/plugins/${game_id}/reference.wasm" --file "$ref_file" --remote &
              pids+=($!)
              wrangler r2 object put "${R2_BUCKET}/plugins/${game_id}/reference.wasm.sig" --file "${ref_file}.sig" --remote &
              pids+=($!)

              # Deploy reference Worker to WfP dispatch namespace
              cp "$ref_file" reference/reference.wasm
              cd reference && npx wrangler deploy --name "${game_id}-reference" --dispatch-namespace "$dispatch_ns" && cd ..
              echo "    Deployed ${game_id}-reference to ${dispatch_ns}"
            fi

            # Upload manifest + detached signature over its literal bytes
            go run ./cmd/savecraft-sign/ "plugins/${game_id}/manifest.json" /tmp/signing_key.priv
            wrangler r2 object put "${R2_BUCKET}/plugins/${game_id}/manifest.json" --file "plugins/${game_id}/manifest.json" --remote &
            pids+=($!)
            wrangler r2 object put "${R2_BUCKET}/plugins/${game_id}/manifest.json.sig" --file "plugins/${game_id}/manifest.json.sig" --remote &
            pids+=($!)

            # Wait for all R2 uploads to finish
            for pid in "${pids[@]}"; do wait "$pid" || exit 1; done
            echo "    Published ${game_id} v${VERSION}"
          done

      - name: Build signed aggregate plugin manifest
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ steps.config.outputs.r2_bucket }}
          SERVER_URL: ${{ steps.config.outputs.server_url }}
          ALL_PLUGINS: ${{ needs.test.outputs.plugins }}
        run: |
          # Conclusion job: rebuild the WHOLE aggregate from each plugin's
          # CURRENT published per-plugin manifest in R2 (the same source the
          # Worker reads — NOT a rebuild-all), so a partial deploy still
          # produces a complete, consistent manifest. Every URL points at the
          # server origin (the Worker serves both the binaries and this signed
          # aggregate verbatim from R2 — all plugin delivery on one origin).
          # Sign the literal bytes; the daemon verifies this against the
          # embedded key (it no longer trusts the Worker).
          mkdir -p dist
          agg='{"plugins":{}}'
          for game_id in $ALL_PLUGINS; do
            if ! wrangler r2 object get "${R2_BUCKET}/plugins/${game_id}/manifest.json" \
                --file "dist/${game_id}.json" --remote 2>/dev/null; then
              echo "::warning::no published manifest for ${game_id}; excluded from aggregate"
              continue
            fi
            base="${SERVER_URL}/plugins/${game_id}"
            entry="$(jq -c --arg base "$base" '
              . + {url: ($base + "/parser.wasm")}
              + (if (.icon == "icon.png" or .icon == "icon.svg")
                   then {icon_url: ($base + "/" + .icon)} else {} end)
              + (if .reference
                   then {reference: (.reference + {url: ($base + "/reference.wasm")})}
                   else {} end)
            ' "dist/${game_id}.json")"
            agg="$(jq -c --arg id "$game_id" --argjson e "$entry" \
              '.plugins[$id] = $e' <<<"$agg")"
          done
          # Write the literal bytes ONCE, sign exactly those bytes, upload the
          # same file unchanged (signed bytes == served bytes).
          printf '%s' "$agg" > dist/plugins-manifest.json
          go run ./cmd/savecraft-sign/ dist/plugins-manifest.json /tmp/signing_key.priv
          wrangler r2 object put "${R2_BUCKET}/plugins/manifest.json" \
            --file dist/plugins-manifest.json --remote
          wrangler r2 object put "${R2_BUCKET}/plugins/manifest.json.sig" \
            --file dist/plugins-manifest.json.sig --remote

      - name: Trigger worker redeploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-cloud.yml

      - name: Clean up signing key
        if: always()
        run: rm -f /tmp/signing_key.priv

      - name: Notify Discord (deploy)
        if: success()
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          ALL_PLUGINS: ${{ needs.test.outputs.plugins }}
          TAG_GAME_ID: ${{ steps.parse.outputs.game_id }}
          IS_PROD: ${{ steps.config.outputs.is_production }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          env_label="staging"
          if [ "$IS_PROD" = "true" ]; then env_label="production"; fi
          if [ -n "$TAG_GAME_ID" ]; then
            deploy_plugins="$TAG_GAME_ID"
          else
            deploy_plugins="$ALL_PLUGINS"
          fi
          for game_id in $deploy_plugins; do
            jq -n \
              --arg gid "$game_id" \
              --arg ver "$VERSION" \
              --arg env "$env_label" \
              '{embeds: [{title: ("Plugin " + $gid + " v" + $ver + " deployed to " + $env), color: 3447003}]}' \
              | curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-
          done

      - name: Find previous plugin tag
        if: steps.config.outputs.is_production == 'true'
        id: prev
        env:
          TAG_GAME_ID: ${{ steps.parse.outputs.game_id }}
        run: |
          prev_tag=$(git tag -l "plugin-${TAG_GAME_ID}-v*" --sort=-v:refname | sed -n '2p')
          echo "tag=${prev_tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.config.outputs.is_production == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PREV_TAG: ${{ steps.prev.outputs.tag }}
        run: |
          notes_flag=""
          if [ -n "$PREV_TAG" ]; then
            notes_flag="--notes-start-tag $PREV_TAG"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $notes_flag

      - name: Notify Discord (release)
        if: success() && steps.config.outputs.is_production == 'true'
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          TAG_GAME_ID: ${{ steps.parse.outputs.game_id }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          jq -n \
            --arg gid "$TAG_GAME_ID" \
            --arg ver "$VERSION" \
            '{embeds: [{title: ("Plugin " + $gid + " v" + $ver + " released"), description: ("The " + $gid + " plugin has been updated to v" + $ver + "."), color: 5793266}]}' \
            | curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-
