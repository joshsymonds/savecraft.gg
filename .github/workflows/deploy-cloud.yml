name: Deploy Cloud

on:
  push:
    branches: [main]
    tags: ["cloud-v*"]
    paths:
      - 'worker/**'
      - 'web/**'

permissions:
  contents: write

jobs:
  environment:
    name: Detect environment
    runs-on: ubuntu-latest
    outputs:
      is_production: ${{ steps.detect.outputs.is_production }}
      wrangler_env: ${{ steps.detect.outputs.wrangler_env }}
      d1_database: ${{ steps.detect.outputs.d1_database }}
      pages_branch: ${{ steps.detect.outputs.pages_branch }}
      public_api_url: ${{ steps.detect.outputs.public_api_url }}
    steps:
      - name: Detect environment from ref
        id: detect
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/cloud-v* ]]; then
            echo "is_production=true" >> "$GITHUB_OUTPUT"
            echo "wrangler_env=production" >> "$GITHUB_OUTPUT"
            echo "d1_database=savecraft" >> "$GITHUB_OUTPUT"
            echo "pages_branch=main" >> "$GITHUB_OUTPUT"
            echo "public_api_url=https://api.savecraft.gg" >> "$GITHUB_OUTPUT"
          else
            echo "is_production=false" >> "$GITHUB_OUTPUT"
            echo "wrangler_env=staging" >> "$GITHUB_OUTPUT"
            echo "d1_database=savecraft-staging" >> "$GITHUB_OUTPUT"
            echo "pages_branch=staging" >> "$GITHUB_OUTPUT"
            echo "public_api_url=https://staging-api.savecraft.gg" >> "$GITHUB_OUTPUT"
          fi

  test-worker:
    name: Worker (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Lint
        run: just lint-worker
        working-directory: .

      - name: Check formatting
        run: just fmt-worker-check
        working-directory: .

      - name: Test
        run: just test-worker
        working-directory: .

  test-web:
    name: Web (lint + typecheck + test)
    runs-on: ubuntu-latest
    env:
      PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Generate SvelteKit types
        run: npx svelte-kit sync

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Lint
        run: just lint-web
        working-directory: .

      - name: Check formatting
        run: just fmt-web-check
        working-directory: .

      - name: Typecheck
        run: just check-web
        working-directory: .

      - name: Test
        run: just test-web
        working-directory: .

  deploy:
    name: Deploy
    needs: [environment, test-worker, test-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply ${{ needs.environment.outputs.d1_database }} --env ${{ needs.environment.outputs.wrangler_env }} --remote
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        run: npx wrangler deploy --env ${{ needs.environment.outputs.wrangler_env }}
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build web
        run: npm run build
        working-directory: web
        env:
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ needs.environment.outputs.is_production == 'true' && secrets.PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.PUBLIC_CLERK_PUBLISHABLE_KEY_STAGING }}
          PUBLIC_API_URL: ${{ needs.environment.outputs.public_api_url }}

      - name: Deploy web to Pages
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name savecraft-web --branch ${{ needs.environment.outputs.pages_branch }}
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  release:
    name: GitHub Release
    needs: [environment, deploy]
    if: needs.environment.outputs.is_production == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find previous cloud tag
        id: prev
        run: |
          prev_tag=$(git tag -l 'cloud-v*' --sort=-v:refname | sed -n '2p')
          echo "tag=${prev_tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PREV_TAG: ${{ steps.prev.outputs.tag }}
        run: |
          notes_flag=""
          if [ -n "$PREV_TAG" ]; then
            notes_flag="--notes-start-tag $PREV_TAG"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $notes_flag

      - name: Notify Discord
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh release view "$TAG" --json body -q .body | head -c 1800)
          jq -n \
            --arg tag "$TAG" \
            --arg body "$body" \
            --arg url "https://github.com/joshsymonds/savecraft.gg/releases/tag/$TAG" \
            '{embeds: [{title: ("Cloud " + $tag + " deployed"), description: $body, url: $url, color: 5793266}]}' \
            | curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-
