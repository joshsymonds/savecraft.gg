name: Deploy Cloud

on:
  push:
    branches: [main]
    tags: ["cloud-v*"]
    paths:
      - 'worker/**'
      - 'web/**'
      - 'site/**'
      - 'plugins/*/reference/**'
      - 'plugins/*/plugin.toml'
      - 'plugins/*/icon.*'
      - '.github/workflows/deploy-cloud.yml'
  pull_request:
    paths:
      - 'worker/**'
      - 'web/**'
      - 'site/**'
      - 'plugins/*/plugin.toml'
      - 'plugins/*/icon.*'
      - '.github/workflows/deploy-cloud.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test-worker:
    name: Worker (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            worker/package-lock.json
            views/package-lock.json

      - run: npm ci

      - name: Install views dependencies
        run: npm ci
        working-directory: views

      - run: npm install -g tsx@4.21.0

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Generate manifests
        run: just build-manifests
        working-directory: .

      - name: Generate views
        run: just build-views
        working-directory: .

      - name: Lint
        run: just lint-worker
        working-directory: .

      - name: Check formatting
        run: just fmt-worker-check
        working-directory: .

      - name: Test
        run: just test-worker
        working-directory: .

  test-web:
    name: Web (lint + typecheck + test)
    runs-on: ubuntu-latest
    env:
      PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Generate SvelteKit types
        run: npx svelte-kit sync

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Lint
        run: just lint-web
        working-directory: .

      - name: Check formatting
        run: just fmt-web-check
        working-directory: .

      - name: Typecheck
        run: just check-web
        working-directory: .

      - name: Test
        run: just test-web
        working-directory: .

  test-site:
    name: Site (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - run: npm ci

      - name: Generate SvelteKit types
        run: npx svelte-kit sync

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Lint
        run: just lint-site
        working-directory: .

      - name: Check formatting
        run: just fmt-site-check
        working-directory: .

      - name: Typecheck
        run: just check-site
        working-directory: .

      - name: Test
        run: just test-site
        working-directory: .

  environment:
    name: Detect environment
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_production: ${{ steps.config.outputs.is_production }}
      wrangler_env: ${{ steps.config.outputs.wrangler_env }}
      d1_database: ${{ steps.config.outputs.d1_database }}
      web_pages_project: ${{ steps.config.outputs.web_pages_project }}
      site_pages_project: ${{ steps.config.outputs.site_pages_project }}
      public_api_url: ${{ steps.config.outputs.public_api_url }}
      public_mcp_url: ${{ steps.config.outputs.public_mcp_url }}
      public_app_url: ${{ steps.config.outputs.public_app_url }}
      public_install_url: ${{ steps.config.outputs.public_install_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        uses: ./.github/actions/compute-version
        with:
          tag_prefix: "cloud-v"

      - name: Set cloud configuration
        id: config
        env:
          DETECTED_ENV: ${{ steps.version.outputs.environment }}
        run: |
          if [ "$DETECTED_ENV" = "production" ]; then
            echo "is_production=true" >> "$GITHUB_OUTPUT"
            echo "wrangler_env=production" >> "$GITHUB_OUTPUT"
            echo "d1_database=savecraft" >> "$GITHUB_OUTPUT"
            echo "web_pages_project=savecraft-web" >> "$GITHUB_OUTPUT"
            echo "site_pages_project=savecraft-site" >> "$GITHUB_OUTPUT"
            echo "public_api_url=https://api.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "public_mcp_url=https://mcp.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "public_app_url=https://my.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "public_install_url=https://install.savecraft.gg" >> "$GITHUB_OUTPUT"
          else
            echo "is_production=false" >> "$GITHUB_OUTPUT"
            echo "wrangler_env=staging" >> "$GITHUB_OUTPUT"
            echo "d1_database=savecraft-staging" >> "$GITHUB_OUTPUT"
            echo "web_pages_project=savecraft-web-staging" >> "$GITHUB_OUTPUT"
            echo "site_pages_project=savecraft-site-staging" >> "$GITHUB_OUTPUT"
            echo "public_api_url=https://staging-api.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "public_mcp_url=https://staging-mcp.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "public_app_url=https://staging-my.savecraft.gg" >> "$GITHUB_OUTPUT"
            echo "public_install_url=https://staging-install.savecraft.gg" >> "$GITHUB_OUTPUT"
          fi

  deploy-worker:
    name: Deploy Worker
    needs: [environment, test-worker, test-web, test-site]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            worker/package-lock.json
            views/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: worker

      - name: Install views dependencies
        run: npm ci
        working-directory: views

      - run: npm install -g tsx@4.21.0

      - uses: taiki-e/install-action@a3324fb0eb94b8230ec968c3389c1b7929fc2f3b # v2
        with:
          tool: just

      - name: Generate manifests
        run: just build-manifests

      - name: Generate views
        run: just build-views

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply ${{ needs.environment.outputs.d1_database }} --env ${{ needs.environment.outputs.wrangler_env }} --remote
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy
        run: npx wrangler deploy --env ${{ needs.environment.outputs.wrangler_env }} --var "VERSION:$VERSION"
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VERSION: ${{ needs.environment.outputs.version }}

  deploy-web:
    name: Deploy Web
    needs: [environment, test-worker, test-web, test-site]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ needs.environment.outputs.is_production == 'true' && secrets.PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.PUBLIC_CLERK_PUBLISHABLE_KEY_STAGING }}
          PUBLIC_API_URL: ${{ needs.environment.outputs.public_api_url }}
          PUBLIC_MCP_URL: ${{ needs.environment.outputs.public_mcp_url }}
          PUBLIC_APP_URL: ${{ needs.environment.outputs.public_app_url }}

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Pages
        run: wrangler pages deploy .svelte-kit/cloudflare --project-name ${{ needs.environment.outputs.web_pages_project }} --branch main
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-site:
    name: Deploy Site
    needs: [environment, test-worker, test-web, test-site]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build
        run: npm run build
        working-directory: site
        env:
          PUBLIC_APP_URL: ${{ needs.environment.outputs.public_app_url }}
          PUBLIC_INSTALL_URL: ${{ needs.environment.outputs.public_install_url }}

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Pages
        run: wrangler pages deploy build/ --project-name ${{ needs.environment.outputs.site_pages_project }} --branch main
        working-directory: site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  notify:
    name: Notify
    needs: [environment, deploy-worker, deploy-web, deploy-site]
    if: always() && needs.deploy-worker.result == 'success' && needs.deploy-web.result == 'success' && needs.deploy-site.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord (deploy)
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          IS_PROD: ${{ needs.environment.outputs.is_production }}
          VERSION: ${{ needs.environment.outputs.version }}
        run: |
          env_label="staging"
          if [ "$IS_PROD" = "true" ]; then env_label="production"; fi
          jq -n \
            --arg ver "$VERSION" \
            --arg env "$env_label" \
            '{embeds: [{title: ("Cloud v" + $ver + " deployed to " + $env), color: 3447003}]}' \
            | curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-

  release:
    name: GitHub Release
    needs: [environment, deploy-worker, deploy-web, deploy-site]
    if: needs.environment.outputs.is_production == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find previous cloud tag
        id: prev
        run: |
          prev_tag=$(git tag -l 'cloud-v*' --sort=-v:refname | sed -n '2p')
          echo "tag=${prev_tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PREV_TAG: ${{ steps.prev.outputs.tag }}
        run: |
          notes_flag=""
          if [ -n "$PREV_TAG" ]; then
            notes_flag="--notes-start-tag $PREV_TAG"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $notes_flag

      - name: Notify Discord (release)
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh release view "$TAG" --json body -q .body | head -c 1800)
          jq -n \
            --arg tag "$TAG" \
            --arg body "$body" \
            --arg url "https://github.com/joshsymonds/savecraft.gg/releases/tag/$TAG" \
            '{embeds: [{title: ("Cloud " + $tag + " released"), description: $body, url: $url, color: 5793266}]}' \
            | curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-
