<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pixel-art flaming sword for Diablo II: Resurrected -->
  <!-- Blade (gold/light) -->
  <rect x="15" y="2" width="2" height="2" fill="#e8c86e"/>
  <rect x="14" y="4" width="2" height="2" fill="#e8c86e"/>
  <rect x="13" y="6" width="2" height="2" fill="#c8a84e"/>
  <rect x="12" y="8" width="2" height="2" fill="#c8a84e"/>
  <rect x="11" y="10" width="2" height="2" fill="#c8a84e"/>
  <rect x="10" y="12" width="2" height="2" fill="#c8a84e"/>
  <!-- Blade edge highlight -->
  <rect x="16" y="4" width="2" height="2" fill="#c8a84e"/>
  <rect x="15" y="6" width="2" height="2" fill="#c8a84e"/>
  <rect x="14" y="8" width="2" height="2" fill="#8890b8"/>
  <rect x="13" y="10" width="2" height="2" fill="#8890b8"/>
  <rect x="12" y="12" width="2" height="2" fill="#8890b8"/>
  <!-- Guard (cross-piece) -->
  <rect x="7" y="14" width="2" height="2" fill="#c8a84e"/>
  <rect x="9" y="14" width="2" height="2" fill="#e8c86e"/>
  <rect x="11" y="14" width="2" height="2" fill="#c8a84e"/>
  <rect x="13" y="14" width="2" height="2" fill="#c8a84e"/>
  <!-- Grip -->
  <rect x="10" y="16" width="2" height="2" fill="#4a5080"/>
  <rect x="11" y="18" width="2" height="2" fill="#4a5080"/>
  <!-- Pommel -->
  <rect x="12" y="20" width="2" height="2" fill="#c8a84e"/>
  <!-- Flames (red/orange accents) -->
  <rect x="17" y="2" width="2" height="2" fill="#e85a5a"/>
  <rect x="18" y="4" width="2" height="2" fill="#e8c44e"/>
  <rect x="17" y="6" width="2" height="2" fill="#e85a5a"/>
  <rect x="13" y="2" width="2" height="2" fill="#e8c44e"/>
  <rect x="12" y="4" width="2" height="2" fill="#e85a5a"/>
  <rect x="19" y="6" width="2" height="2" fill="#e8c44e"/>
  <rect x="11" y="6" width="2" height="2" fill="#e8c44e"/>
</svg>
