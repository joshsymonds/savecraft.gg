<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pixel-art skull for Diablo II: Resurrected (4px grid) -->
  <!-- Row 0: cranium top -->
  <rect x="8" y="0" width="16" height="4" fill="#e8c86e"/>
  <!-- Row 1: cranium wide -->
  <rect x="4" y="4" width="24" height="4" fill="#e8c86e"/>
  <!-- Row 2: eye sockets (gaps at x=8-12 and x=20-24) -->
  <rect x="4" y="8" width="4" height="4" fill="#c8a84e"/>
  <rect x="12" y="8" width="8" height="4" fill="#e8c86e"/>
  <rect x="24" y="8" width="4" height="4" fill="#c8a84e"/>
  <!-- Row 3: below eyes -->
  <rect x="4" y="12" width="24" height="4" fill="#c8a84e"/>
  <!-- Row 4: nose (gaps in middle) -->
  <rect x="8" y="16" width="4" height="4" fill="#c8a84e"/>
  <rect x="20" y="16" width="4" height="4" fill="#c8a84e"/>
  <!-- Row 5: jaw -->
  <rect x="4" y="20" width="24" height="4" fill="#e8c86e"/>
  <!-- Row 6: teeth (gaps at x=8-12 and x=20-24) -->
  <rect x="4" y="24" width="4" height="4" fill="#c8a84e"/>
  <rect x="12" y="24" width="8" height="4" fill="#e8c86e"/>
  <rect x="24" y="24" width="4" height="4" fill="#c8a84e"/>
</svg>
