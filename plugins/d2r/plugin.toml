game_id = "d2r"
sources = ["wasm"]
icon = "icon.png"
name = "Diablo II: Resurrected"
description = "Parses .d2s character saves and .d2i shared stash from Reign of the Warlock (v105)"
channel = "beta"
coverage = "partial"
file_extensions = [".d2s", ".d2i"]
homepage = "https://savecraft.gg/plugins/d2r"

limitations = [
  "Only Reign of the Warlock (v105) saves — classic LoD not supported",
]

[attribution]
sources = ["blizzard"]

[author]
name = "Josh Symonds"
github = "joshsymonds"

[default_paths]
windows = "%USERPROFILE%/Saved Games/Diablo II Resurrected"
linux = "~/.steam/steam/steamapps/compatdata/2536520/pfx/drive_c/users/steamuser/Saved Games/Diablo II Resurrected"
darwin = "~/Library/Application Support/Diablo II Resurrected"

[reference.modules.drop_calc]
name = "Drop Calculator"
description = "Compute drop probabilities for any item from any farmable source, accounting for Magic Find, player count, and treasure class mechanics."
view_default = "visible"
