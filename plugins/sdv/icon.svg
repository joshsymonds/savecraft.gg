<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pixel-art star for Stardew Valley (4px grid) -->
  <!-- Row 0: top point -->
  <rect x="12" y="0" width="8" height="4" fill="#e8c86e"/>
  <!-- Row 1: upper body -->
  <rect x="8" y="4" width="16" height="4" fill="#e8c86e"/>
  <!-- Row 2: horizontal arms -->
  <rect x="0" y="8" width="32" height="4" fill="#5abe8a"/>
  <!-- Row 3: upper-lower body -->
  <rect x="4" y="12" width="24" height="4" fill="#5abe8a"/>
  <!-- Row 4: lower body -->
  <rect x="8" y="16" width="16" height="4" fill="#e8c86e"/>
  <!-- Row 5: legs split -->
  <rect x="4" y="20" width="12" height="4" fill="#5abe8a"/>
  <rect x="20" y="20" width="8" height="4" fill="#5abe8a"/>
  <!-- Row 6: feet -->
  <rect x="0" y="24" width="8" height="4" fill="#4a9a6a"/>
  <rect x="24" y="24" width="8" height="4" fill="#4a9a6a"/>
</svg>
