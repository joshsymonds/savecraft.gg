[reference.modules.build_planner]
name = "Build Planner"
description = "Analyze, modify, or explore a Path of Exile build via Path of Building. First call returns a compact summary (DPS, life, resists, attributes) and a section_index listing available detail sections. To drill deeper, call again with buildId and sections (e.g. 'offense,defense'). For modifications, pass buildId + operations + sections to see before/after comparison. For tree exploration, pass buildId + nearby_metrics to find the highest-impact nearby nodes. Every response includes a buildId for follow-up calls."
