game_id = "mtga"
source = "wasm"
icon = "icon.png"
name = "Magic: The Gathering Arena"
description = "Parses Player.log for collection, decks, match history, play-by-play game logs, drafts, rank, and inventory"
channel = "beta"
coverage = "partial"
file_extensions = []
file_patterns = ["Player.log", "Player-prev.log"]
homepage = "https://savecraft.gg/plugins/mtga"

limitations = [
  "Requires 'Detailed Logs' enabled in MTGA settings",
  "Log clears on game restart — only current session data available",
  "Card names require Scryfall data update after new set releases",
]

[author]
name = "Josh Symonds"
github = "joshsymonds"

[default_paths]
windows = "%USERPROFILE%/AppData/LocalLow/Wizards Of The Coast/MTGA"
linux = "~/.local/share/Steam/steamapps/compatdata/2141910/pfx/drive_c/users/steamuser/AppData/LocalLow/Wizards Of The Coast/MTGA"
darwin = "~/Library/Logs/Wizards of the Coast/MTGA"

[reference.modules.rules_search]
name = "Rules Search"
description = "Search the MTG Comprehensive Rules and official per-card rulings from Scryfall. Query by rule number, keyword, or card name."

[reference.modules.rules_search.attribution]
author = "Josh Symonds"
data_sources = [
  { name = "MTG Comprehensive Rules", origin = "Wizards of the Coast" },
  { name = "Scryfall Card Rulings", origin = "Scryfall (scryfall.com), rulings copyright Wizards of the Coast" },
]

[reference.modules.card_search]
name = "Card Search"
description = "Search Magic: The Gathering cards by name, color, type, mana cost, oracle text, and format legality using Scryfall data."

[reference.modules.card_search.attribution]
author = "Josh Symonds"
data_sources = [
  { name = "Scryfall Oracle Cards", origin = "Scryfall bulk data (scryfall.com), card data copyright Wizards of the Coast" },
]

[reference.modules.collection_diff]
name = "Collection Diff"
description = "Calculate the wildcard cost to complete a target decklist given a player's current collection. Returns missing cards grouped by rarity with total wildcard cost."

[reference.modules.collection_diff.attribution]
author = "Josh Symonds"

[reference.modules.draft_ratings]
name = "Draft Ratings"
description = "Per-card draft performance statistics from millions of real games across all available sets. Provides GIH WR, OHWR, IWD, ALSA, ATA with game counts, overall and by archetype (mono through five-color)."

[reference.modules.draft_ratings.attribution]
author = "Josh Symonds"
data_sources = [
  { name = "17Lands Public Datasets", origin = "17lands.com, licensed CC BY 4.0" },
]

[reference.modules.card_stats]
name = "Card Stats"
description = "Browse 17Lands draft statistics for MTG Arena. List available sets, view set overviews with top and bottom performers, get single card detail with breakdowns across all 31 color archetypes, or sort leaderboards by any stat."

[reference.modules.card_stats.attribution]
author = "Josh Symonds"
data_sources = [
  { name = "17Lands Public Datasets", origin = "17lands.com, licensed CC BY 4.0" },
]

[reference.modules.draft_advisor]
name = "Draft Advisor"
description = "Contextual draft pick evaluation using 8-axis WASPAS scoring across all 31 color archetypes, format-adjusted by empirical win rate so the system steers toward stronger archetypes when commitment is equal. Bayesian-calibrated baseline win rate, archetype-stratified pairwise synergy, curve fit, signal openness, role composition, castability, color commitment, and opportunity cost. Each archetype candidate includes a viability tier (strong/moderate/sparse/fringe) so the AI warns when you're in an underrepresented archetype. Batch review tracks archetype evolution across picks. Supports live pick ranking and full draft batch review."

[reference.modules.draft_advisor.attribution]
author = "Josh Symonds"
data_sources = [
  { name = "17Lands Public Datasets", origin = "17lands.com, licensed CC BY 4.0" },
]

[reference.modules.deckbuilding]
name = "Deck Health & Cut Advisor"
description = "Analyze a limited deck against empirical data from winning decks across all 31 color archetypes. Health check compares composition against archetype averages and suggests up to 3 alternative archetypes your pool supports with cards to cut and estimated win rate shift. Cut advisor scores every card across 5 axes to identify the weakest cards to cut."

[reference.modules.deckbuilding.attribution]
author = "Josh Symonds"
data_sources = [
  { name = "17Lands Public Datasets", origin = "17lands.com, licensed CC BY 4.0" },
]

[reference.modules.mana_base]
name = "Mana Base"
description = "Analyze colored mana source requirements for a deck using Frank Karsten's methodology. Returns the number of colored sources needed per color to achieve ~89%+ on-curve consistency."

[reference.modules.mana_base.attribution]
author = "Josh Symonds"
